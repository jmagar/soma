# =============================================================================
# docker-compose.yml — Template for deploying an rmcp-based MCP server
#
# TEMPLATE: Replace all occurrences of "example" with your service name.
#           Replace all occurrences of "EXAMPLE" with your service name in caps.
#
# Key substitutions:
#   "example-mcp"          → your Docker service/container name
#   "example-mcp-data"     → your Docker volume name
#   "ghcr.io/.../example"  → your published Docker image path
#   port 3000              → your service's MCP port (config.toml [mcp] port)
#   EXAMPLE_*              → your env var prefix
#
# Usage:
#   docker compose up -d          # start (uses published image by default)
#   docker compose build --no-cache && docker compose up -d  # build from source
#   docker compose logs -f        # follow logs
#   docker compose down           # stop and remove containers (data volume persists)
# =============================================================================

services:
  # TEMPLATE: Replace "example-mcp" with your service name throughout this file.
  example-mcp:
    # Default to the published image so plugin deploys can `docker compose pull`
    # without the source tree. Override with --build for local source development.
    # TEMPLATE: Replace with your image path (e.g. ghcr.io/your-org/your-repo:latest)
    image: ghcr.io/your-org/example-mcp:${EXAMPLE_MCP_VERSION:-latest}
    build:
      context: .
      dockerfile: config/Dockerfile
    container_name: example-mcp
    restart: unless-stopped

    # Pin UID/GID so the container writes /data files with the host user's
    # ownership — makes it easy to inspect or back up the data directory.
    # TEMPLATE: Replace EXAMPLE_UID/GID with your prefix (e.g. MYSERVICE_UID)
    user: "${EXAMPLE_UID:-1000}:${EXAMPLE_GID:-1000}"

    # Loads variables from .env file (generated by plugin-setup.sh, or copy .env.example)
    env_file:
      - path: .env
        required: false

    ports:
      # TEMPLATE: Change 3000 to your service port (must match config.toml port).
      # Format: "<host-port>:<container-port>/tcp"
      # The container always binds the internal port (3000).
      # Set EXAMPLE_MCP_HOST_PORT in .env to publish on a different host port.
      - "${EXAMPLE_MCP_HOST_PORT:-40060}:40060/tcp"

    volumes:
      # /data is the container's persistent storage (auth DB, config, .env, etc.)
      #
      # Pattern §25: The host path is always ~/.<service>/ so the same config.toml
      # and .env work for both Docker and bare-metal deployment without modification.
      #
      # TEMPLATE: Replace ".example" with your service name (e.g. ".unraid", ".gotify").
      #           This MUST match the service name returned by default_data_dir() in
      #           src/config.rs.
      #
      # Alternative: use a named Docker volume (managed by Docker, harder to inspect):
      #   - ${EXAMPLE_MCP_DATA_VOLUME:-example-mcp-data}:/data
      # Named-volume fallback is shown in the volumes: section below.
      - ${HOME}/.example:/data

    networks:
      - jakenet

    healthcheck:
      # TEMPLATE: Change port 3000 to match your EXPOSE port.
      test: ["CMD-SHELL", "curl -sf http://localhost:40060/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          # TEMPLATE: Adjust memory and CPU limits for your service's workload.
          # A lightweight MCP server typically needs < 256M; increase for data-heavy services.
          memory: 256M
          cpus: '0.5'

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  # TEMPLATE: Replace "example-mcp-data" with your volume name.
  # Docker manages this volume's lifecycle — it persists across `docker compose down`.
  # To destroy it: docker volume rm example-mcp-data
  example-mcp-data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  # "jakenet" is an external network shared across homelab services.
  # TEMPLATE: Change the network name if you use a different shared network.
  #
  # Create it if it doesn't exist:
  #   docker network create jakenet
  #
  # The plugin-setup.sh script creates this automatically in Docker mode.
  # To use a different default, set DOCKER_NETWORK=your-network in .env.
  jakenet:
    name: ${DOCKER_NETWORK:-jakenet}
    external: true
