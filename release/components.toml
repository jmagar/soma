schema_version = 1

[[components]]
id = "soma"
name = "soma"
tag_prefix = "v"
release_workflow = "release.yml"
shipping_paths = [
  "Cargo.toml",
  "Cargo.lock",
  "apps/soma",
  "crates",
  "apps/web",
  "config",
  "entrypoint.sh",
  "install.sh",
  "server.json",
  "plugins/soma",
  "packages/soma-rmcp",
  ".github/workflows/release.yml",
  "scripts/repair.sh",
  "release-please-config.json",
  ".release-please-manifest.json",
  ".github/workflows/release-please.yml",
  ".github/workflows/docker-publish.yml",
]
version_source = { kind = "cargo_package", path = "apps/soma/Cargo.toml", package = "soma" }
version_files = [
  { kind = "cargo_package", path = "apps/soma/Cargo.toml", package = "soma" },
  { kind = "cargo_lock_package", path = "Cargo.lock", package = "soma" },
  { kind = "json_version", path = "server.json", json_pointer = "/version" },
  { kind = "json_version", path = "server.json", json_pointer = "/packages/0/version" },
  { kind = "json_version", path = "packages/soma-rmcp/package.json", json_pointer = "/version" },
  { kind = "npm_identifier_version", path = "server.json", json_pointer = "/_meta/io.modelcontextprotocol.registry~1publisher-provided/distribution/npm" },
  { kind = "json_version", path = "docs/generated/openapi.json", json_pointer = "/info/version" },
  { kind = "changelog_heading", path = "CHANGELOG.md" },
  { kind = "json_no_version", path = "plugins/soma/.claude-plugin/plugin.json" },
  { kind = "json_no_version", path = "plugins/soma/.codex-plugin/plugin.json" },
  { kind = "json_no_version", path = "plugins/soma/gemini-extension.json" },
]
