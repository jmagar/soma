# =============================================================================
# .gitleaks.toml — secret-scanning policy for this repo
#
# Extends gitleaks' built-in ruleset (useDefault = true) and layers an allowlist
# for the placeholder / fixture credentials Soma ships on purpose, so
# the `gitleaks` CI job stays sharp without false-failing on documented examples.
#
# CUSTOMIZE: keep this file. Add real allowlist entries here when a legitimate
# placeholder trips the scanner — never disable the job or commit real secrets.
# =============================================================================

title = "soma gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Placeholder and test-fixture credentials that are not real secrets"
condition = "OR"

# Historical generated auth template commit containing a static RSA test fixture.
commits = [
  "03ec0523ed3aa7d428e73bac3afff14034de0b5a",
]

# Fixture tokens that appear in tests/docs by design.
regexes = [
  # Deterministic 32-byte test token used by auth fixtures.
  '''0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20''',
  # Literal placeholder bearer used in dispatch/router tests.
  '''bearer_state\("secret"\)''',
]

# Paths that only ever contain examples, fixtures, or generated docs.
paths = [
  '''.*tests?/.*''',
  '''config\.soma\.toml''',
  '''CHANGELOG\.md''',
  '''docs/.*''',
]

# Generic placeholder words that should never be treated as live secrets.
stopwords = [
  "soma",
  "placeholder",
  "changeme",
  "your-token",
  "your_token",
]
