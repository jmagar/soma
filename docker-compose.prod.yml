# =============================================================================
# docker-compose.prod.yml — Production deployment template
#
# TEMPLATE: Replace all occurrences of "example" with your service name.
#           Replace all occurrences of "EXAMPLE" with your service name in caps.
#
# Key substitutions:
#   "template-rmcp"          -> your Docker service/container name
#   "template-rmcp-data"     -> your Docker volume name
#   "ghcr.io/.../example"  -> your published Docker image path
#   port 40060             -> your service's MCP port
#   RTEMPLATE_*              -> your env var prefix
# =============================================================================

name: template-rmcp

x-common-service: &common-service
  networks:
    - mcp
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  template-rmcp:
    <<: *common-service
    # TEMPLATE: Replace with your image path.
    image: ghcr.io/your-org/template-rmcp:${RTEMPLATE_MCP_VERSION:-latest}
    container_name: template-rmcp
    env_file:
      - path: .env
        required: false
    environment:
      RTEMPLATE_MCP_HOST: 0.0.0.0
      RTEMPLATE_NOAUTH: "true"
    ports:
      - "${RTEMPLATE_MCP_HOST_PORT:-40060}:40060/tcp"
    volumes:
      - ${HOME}/.example:/data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:40060/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  template-rmcp-data:

networks:
  mcp:
    name: ${DOCKER_NETWORK:-mcp}
    external: true
