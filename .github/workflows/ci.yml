# =============================================================================
# .github/workflows/ci.yml — Continuous Integration
#
# TEMPLATE substitutions required:
#   REPO_NAME   → your GitHub repo name (e.g. "myservice-mcp")
#   BINARY_NAME → your binary name from Cargo.toml [[bin]] (e.g. "myservice")
#
# This workflow runs on every push and PR to main.
# Jobs: actionlint, fmt, clippy, test (nextest), web, native builds, MCP smoke,
# compose/container smoke, toml, template checks, version sync, deny, gitleaks
#
# All jobs must pass before merging. Adjust the matrix rust-version to match
# your Cargo.toml `rust-version` field.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Keep Windows artifacts portable even on self-hosted runners whose user-level
  # Cargo config may contain target-cpu=native or machine-specific SIMD flags.
  WINDOWS_PORTABLE_RUSTFLAGS: >-
    -C target-cpu=x86-64
    -C target-feature=-avx512f,-avx512vl,-avx512bw,-avx512dq,-avx512cd,-avx512ifma,-avx512vbmi,-avx512vbmi2,-avx512vnni,-avx512bitalg,-avx512vpopcntdq

jobs:
  # -- actionlint: GitHub Actions workflow syntax and shell checks -------------
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: stable

      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@latest

  # ── fmt: cargo fmt --check ──────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust (stable with rustfmt)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── clippy: zero warnings ────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust (stable with clippy)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      # Cache Cargo registry and build artifacts between runs.
      # TEMPLATE: Change the cache key prefix from "rmcp-template" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-clippy-

      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  # ── test: cargo nextest run --profile ci ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # TEMPLATE: Change cache key prefix from "rmcp-template" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-test-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0 # cargo-nextest

      - name: cargo nextest run --profile ci
        run: cargo nextest run --profile ci

  # ── web: pnpm install, lint, audit, static build ─────────────────────────────
  frontend-assets:
    name: Frontend Assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        run: npm install -g "$(node -p "require('./package.json').packageManager")"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --prod --audit-level high

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm build
        run: pnpm build

      - name: Upload web export
        uses: actions/upload-artifact@v7
        with:
          name: web-out
          path: apps/web/out/
          if-no-files-found: error
          retention-days: 1

  # -- native release builds ----------------------------------------------------
  #
  # These jobs mirror the Axon pattern: prove the binary builds on Linux and on
  # native Windows during PR CI, then upload the runnable artifacts for manual
  # smoke testing. Release tags still use .github/workflows/release.yml for
  # packaging and GitHub Release publication.
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: frontend-assets
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-build-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-build-linux-

      - name: cargo build local binary
        run: cargo build --release --locked --bin rtemplate --no-default-features --features local-adapter

      - name: cargo build server binary
        run: cargo build --release --locked --bin rtemplate-server --features full

      - name: Upload Linux binary
        uses: actions/upload-artifact@v7
        with:
          name: rtemplate-linux-x86_64
          path: target/release/rtemplate
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: [self-hosted, Windows, rmcp-template, steamy]
    needs: frontend-assets
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Show Windows Rust CPU flags
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: |
          $ErrorActionPreference = 'Continue'
          rustc -vV
          "RUSTFLAGS=$env:RUSTFLAGS"
          rustc --print cfg | Select-String 'target_feature'
          cargo config get build.rustflags --merged
          if ($LASTEXITCODE -ne 0) { "build.rustflags not set" }
          cargo config get target.x86_64-pc-windows-msvc.rustflags --merged
          if ($LASTEXITCODE -ne 0) { "target rustflags not set" }
          exit 0

      - name: cargo test
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: cargo test --locked --all-targets

      - name: cargo build local binary
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: cargo build --release --locked --bin rtemplate --no-default-features --features local-adapter

      - name: cargo build server binary
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: cargo build --release --locked --bin rtemplate-server --features full

      - name: Upload Windows binary
        uses: actions/upload-artifact@v7
        with:
          name: rtemplate-windows-x86_64
          path: target/release/rtemplate.exe
          if-no-files-found: error

  # -- mcp-smoke: live MCP HTTP tool/resource smoke through mcporter -----------
  mcp-smoke:
    name: MCP Smoke
    runs-on: ubuntu-latest
    needs: frontend-assets
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-mcp-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-mcp-smoke-

      - name: Install smoke test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          npm install -g mcporter@0.7.3

      - name: Build rtemplate server binary
        run: cargo build --locked --bin rtemplate-server --features full

      - name: Start MCP server
        env:
          RTEMPLATE_MCP_HOST: 127.0.0.1
          RTEMPLATE_MCP_PORT: 40123
          RTEMPLATE_MCP_NO_AUTH: "true"
          RUST_LOG: info,rmcp=warn
        run: |
          set -euo pipefail
          ./target/debug/rtemplate-server serve mcp > /tmp/rtemplate-mcp.log 2>&1 &
          echo "$!" > /tmp/rtemplate-mcp.pid
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:40123/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/rtemplate-mcp.log
          exit 1

      - name: Run mcporter smoke tests
        env:
          RTEMPLATE_MCP_HOST: 127.0.0.1
          RTEMPLATE_MCP_PORT: 40123
        run: bash tests/mcporter/test-mcp.sh --timeout-ms 20000

      - name: Upload MCP smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-smoke-logs
          path: |
            /tmp/rtemplate-mcp.log
            /tmp/test-mcp.*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stop MCP server
        if: always()
        run: |
          kill "$(cat /tmp/rtemplate-mcp.pid 2>/dev/null)" 2>/dev/null || true

  # -- container-smoke: compose config plus Docker build on PRs/main ------------
  container-smoke:
    name: Container Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v4.0.0

      - name: Create Docker network
        run: docker network create "${DOCKER_NETWORK:-mcp}" || true

      - name: Validate production compose
        run: docker compose --env-file .env.example -f docker-compose.prod.yml config --quiet

      - name: Validate development compose
        run: docker compose --env-file .env.example -f docker-compose.yml config --quiet

      - name: Build container image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: config/Dockerfile
          push: false
          tags: rmcp-template:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── toml: taplo check ─────────────────────────────────────────────────────────
  toml:
    name: TOML Format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install taplo
        uses: taiki-e/install-action@e03236526ace47fa2e04bebcfc6da471ebd4690c # v2.49.0
        with:
          tool: taplo-cli

      - name: taplo check
        run: taplo check

  # ── template: generated docs, plugin layout, coupled files ───────────────────
  template:
    name: Template Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Check PATTERNS.md contracts
        run: cargo xtask patterns

      - name: Check test sibling coverage
        run: cargo xtask check-test-siblings

      - name: Validate plugin layout
        run: bash scripts/validate-plugin-layout.sh

      - name: Check schema docs
        run: python3 scripts/check-schema-docs.py --check

      - name: Check OpenAPI docs
        run: python3 scripts/check-openapi.py --check

      - name: Check scaffold intent contract
        run: python3 scripts/check-scaffold-intent-contract.py

      - name: Check release versions
        run: cargo xtask check-release-versions --base origin/main --head HEAD --mode pr

      - name: Run template feature smoke tests
        run: bash scripts/test-template-features.sh

      - name: Check blob sizes
        run: python3 scripts/check-blob-size.py --base origin/main --head HEAD

      - name: Check coupled files
        run: bash scripts/check-coupled-files.sh origin/main HEAD

      - name: ASCII hygiene
        run: bash scripts/run-ascii-check.sh

  # ── deny: dependency advisories, licenses, bans, sources ─────────────────────
  audit:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2
        with:
          command: check
          arguments: --all-features

  # ── gitleaks: secret scanning ─────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history needed for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
