# =============================================================================
# .github/workflows/ci.yml — Continuous Integration
#
# CUSTOMIZATION NOTES:
#   REPO_NAME   → your GitHub repo name (e.g. "myservice-mcp")
#   BINARY_NAME → your binary name from Cargo.toml [[bin]] (e.g. "myservice")
#
# This workflow runs on every push and PR to main.
# Jobs: actionlint, fmt, clippy, test (nextest), web, native builds, MCP smoke,
# compose/container smoke, toml, Soma checks, version sync, deny, gitleaks
#
# All jobs must pass before merging. Adjust the matrix rust-version to match
# your Cargo.toml `rust-version` field.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Force CI through sccache on both Linux and Windows. This also overrides the
  # repo's dev-only scripts/cargo-rustc-wrapper, whose local binary-sync side
  # effects are not wanted in CI and whose bash wrapper cannot run on Windows.
  RUSTC_WRAPPER: sccache
  CARGO_BUILD_RUSTC_WRAPPER: sccache
  SCCACHE_DIR: ${{ github.workspace }}/../.sccache
  # Keep Windows artifacts portable even on self-hosted runners whose user-level
  # Cargo config may contain target-cpu=native or machine-specific SIMD flags.
  WINDOWS_PORTABLE_RUSTFLAGS: >-
    -C target-cpu=x86-64
    -C target-feature=-avx512f,-avx512vl,-avx512bw,-avx512dq,-avx512cd,-avx512ifma,-avx512vbmi,-avx512vbmi2,-avx512vnni,-avx512bitalg,-avx512vpopcntdq

jobs:
  changes:
    name: Changes
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, tootie, rmcp-template]
    outputs:
      all: ${{ steps.classify.outputs.all }}
      docs: ${{ steps.classify.outputs.docs }}
      workflow: ${{ steps.classify.outputs.workflow }}
      rust: ${{ steps.classify.outputs.rust }}
      web: ${{ steps.classify.outputs.web }}
      native: ${{ steps.classify.outputs.native }}
      mcp: ${{ steps.classify.outputs.mcp }}
      docker: ${{ steps.classify.outputs.docker }}
      toml: ${{ steps.classify.outputs.toml }}
      soma: ${{ steps.classify.outputs.soma }}
      security: ${{ steps.classify.outputs.security }}
      secrets: ${{ steps.classify.outputs.secrets }}
      release: ${{ steps.classify.outputs.release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Classify changed paths
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: >
          cargo run --manifest-path xtask/Cargo.toml -- changed-paths
          --event "$EVENT_NAME"
          --output "$GITHUB_OUTPUT"
          --write-changed-files changed-files.txt

      - name: Show changed files
        run: cat changed-files.txt || true

  # -- actionlint: GitHub Actions workflow syntax and shell checks -------------
  actionlint:
    name: Actionlint
    needs: [changes]
    if: ${{ needs.changes.outputs.workflow == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@latest

  # ── fmt: cargo fmt --check ──────────────────────────────────────────────────
  fmt:
    name: Format
    needs: [changes]
    if: ${{ needs.changes.outputs.rust == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── clippy: zero warnings ────────────────────────────────────────────────────
  clippy:
    name: Clippy
    needs: [changes]
    if: ${{ needs.changes.outputs.rust == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache
        with:
          components: clippy

      # Cache Cargo registry and build artifacts between runs.
      # CUSTOMIZE: Change the cache key prefix from "soma" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            target
          key: ${{ github.repository }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-clippy-

      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  # ── test: cargo nextest run --profile ci ─────────────────────────────────────
  test:
    name: Test
    needs: [changes]
    if: ${{ needs.changes.outputs.rust == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      # CUSTOMIZE: Change cache key prefix from "soma" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            target
          key: ${{ github.repository }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-test-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0 # cargo-nextest

      - name: Build stdio test binary
        run: cargo build --bin soma

      - name: cargo nextest run --profile ci
        run: cargo nextest run --profile ci

      - name: Upload nextest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextest-junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 14

  # ── web: pnpm install, lint, audit, static build ─────────────────────────────
  frontend-assets:
    name: Frontend Assets
    needs: [changes]
    if: ${{ (needs.changes.outputs.web == 'true' || needs.changes.outputs.native == 'true' || needs.changes.outputs.mcp == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: node pnpm
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # npm retired the audit endpoint(s) pnpm 10.x calls
      # (https://api-docs.npmjs.com/#tag/Audit - "quick" and its own fallback
      # both now return 410), so pnpm@10.33.2 (our pinned version) fails this
      # step with ERR_PNPM_AUDIT_BAD_RESPONSE regardless of the actual
      # dependency tree - confirmed reproducible locally, unrelated to any
      # PR's changes. pnpm@11+ is expected to pick up the new bulk endpoint;
      # revisit once we deliberately upgrade pnpm and verify `pnpm audit`
      # works again. Only THIS specific known failure signature is treated
      # as non-blocking below - a genuine high/critical advisory (or any
      # other unexpected failure) still fails the step, since a blanket
      # continue-on-error would silently swallow real findings too.
      - name: pnpm audit
        run: |
          set +e
          output=$(pnpm audit --prod --audit-level high 2>&1)
          status=$?
          echo "$output"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if echo "$output" | grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE"; then
            echo "::warning::pnpm audit endpoint is currently retired upstream (see comment above) - treating as non-blocking, not a real vulnerability finding."
            exit 0
          fi
          echo "::error::pnpm audit failed - either a genuine vulnerability finding or an unexpected error. Failing CI."
          exit "$status"

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm build
        run: pnpm build

      - name: Upload web export
        uses: actions/upload-artifact@v7
        with:
          name: web-out
          path: apps/web/out/
          if-no-files-found: error
          retention-days: 1

  # -- native release builds ----------------------------------------------------
  #
  # These jobs mirror the Axon pattern: prove the binary builds on Linux and on
  # native Windows during PR CI, then upload the runnable artifacts for manual
  # smoke testing. Release tags still use .github/workflows/release.yml for
  # packaging and GitHub Release publication.
  build-linux:
    name: Build Linux
    runs-on: [self-hosted, tootie, rmcp-template]
    needs: [changes, frontend-assets]
    if: ${{ always() && needs.changes.outputs.native == 'true' && needs.frontend-assets.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            target
          key: ${{ github.repository }}-build-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-build-linux-

      - name: cargo build local binary
        run: cargo build --release --locked --bin soma --no-default-features --features local-adapter

      - name: cargo build full binary
        run: cargo build --release --locked --bin soma --features full

      - name: Upload Linux binary
        uses: actions/upload-artifact@v7
        with:
          name: soma-linux-x86_64
          path: target/release/soma
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: [self-hosted, Windows, rmcp-template, steamy]
    needs: [changes, frontend-assets]
    if: ${{ always() && needs.changes.outputs.native == 'true' && needs.frontend-assets.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Disable sccache for native Windows cargo
        shell: pwsh
        run: |
          "RUSTC_WRAPPER=" >> $env:GITHUB_ENV
          "CARGO_BUILD_RUSTC_WRAPPER=" >> $env:GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Show Windows Rust CPU flags
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: |
          $ErrorActionPreference = 'Continue'
          rustc -vV
          sccache --version
          "RUSTC_WRAPPER=$env:RUSTC_WRAPPER"
          "CARGO_BUILD_RUSTC_WRAPPER=$env:CARGO_BUILD_RUSTC_WRAPPER"
          "SCCACHE_DIR=$env:SCCACHE_DIR"
          "RUSTFLAGS=$env:RUSTFLAGS"
          rustc --print cfg | Select-String 'target_feature'
          cargo config get build.rustflags --merged
          if ($LASTEXITCODE -ne 0) { "build.rustflags not set" }
          cargo config get target.x86_64-pc-windows-msvc.rustflags --merged
          if ($LASTEXITCODE -ne 0) { "target rustflags not set" }
          exit 0

      - name: Configure Windows Python launcher
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $python = Get-Command python -ErrorAction SilentlyContinue
          if (-not $python) {
            $python = Get-Command py -ErrorAction SilentlyContinue
          }
          if (-not $python) {
            throw "Python launcher not found on Windows runner"
          }
          "SOMA_PYTHON_COMMAND=$($python.Source)" >> $env:GITHUB_ENV
          & $python.Source --version

      - name: cargo test
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: |
          $ErrorActionPreference = "Stop"
          $process = Start-Process `
            -FilePath cargo `
            -ArgumentList @("test", "--locked", "--all-targets") `
            -NoNewWindow `
            -PassThru

          while (-not $process.HasExited) {
            Start-Sleep -Seconds 60
            if (-not $process.HasExited) {
              Write-Host "Windows cargo test still running at $(Get-Date -Format o)"
            }
          }

          exit $process.ExitCode

      - name: cargo build local binary
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: |
          $ErrorActionPreference = "Stop"
          $process = Start-Process `
            -FilePath cargo `
            -ArgumentList @("build", "--release", "--locked", "--bin", "soma", "--no-default-features", "--features", "local-adapter") `
            -NoNewWindow `
            -PassThru

          while (-not $process.HasExited) {
            Start-Sleep -Seconds 60
            if (-not $process.HasExited) {
              Write-Host "Windows local binary build still running at $(Get-Date -Format o)"
            }
          }

          exit $process.ExitCode

      - name: cargo build full binary
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: |
          $ErrorActionPreference = "Stop"
          $process = Start-Process `
            -FilePath cargo `
            -ArgumentList @("build", "--release", "--locked", "--bin", "soma", "--features", "full") `
            -NoNewWindow `
            -PassThru

          while (-not $process.HasExited) {
            Start-Sleep -Seconds 60
            if (-not $process.HasExited) {
              Write-Host "Windows full binary build still running at $(Get-Date -Format o)"
            }
          }

          exit $process.ExitCode

      - name: Upload Windows binary
        uses: actions/upload-artifact@v7
        with:
          name: soma-windows-x86_64
          path: target/release/soma.exe
          if-no-files-found: error

  # -- mcp-smoke: live MCP HTTP tool/resource smoke through mcporter -----------
  mcp-smoke:
    name: MCP Smoke
    runs-on: [self-hosted, tootie, rmcp-template]
    needs: [changes, frontend-assets]
    if: ${{ always() && (needs.changes.outputs.mcp == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true') && needs.frontend-assets.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Set up mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: node npm:mcporter
          cache: true

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            target
          key: ${{ github.repository }}-mcp-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-mcp-smoke-

      - name: Install smoke test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Build Soma full binary
        run: cargo build --locked --bin soma --features full

      - name: Start MCP server
        env:
          SOMA_MCP_HOST: 127.0.0.1
          SOMA_MCP_PORT: 40123
          SOMA_MCP_NO_AUTH: "true"
          RUST_LOG: info,rmcp=warn
        run: |
          set -euo pipefail
          ./target/debug/soma serve > /tmp/soma-mcp.log 2>&1 &
          echo "$!" > /tmp/soma-mcp.pid
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:40123/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/soma-mcp.log
          exit 1

      - name: Run mcporter smoke tests
        env:
          SOMA_MCP_HOST: 127.0.0.1
          SOMA_MCP_PORT: 40123
        run: bash crates/soma/tests/mcporter/test-mcp.sh --timeout-ms 20000

      - name: Upload MCP smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-smoke-logs
          path: |
            /tmp/soma-mcp.log
            /tmp/test-mcp.*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stop MCP server
        if: always()
        run: |
          kill "$(cat /tmp/soma-mcp.pid 2>/dev/null)" 2>/dev/null || true

  # -- container-smoke: compose config plus Docker build on PRs/main ------------
  container-smoke:
    name: Container Smoke
    needs: [changes]
    if: ${{ needs.changes.outputs.docker == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Docker Compose
        run: |
          set -euo pipefail
          if docker compose version >/dev/null 2>&1; then
            docker compose version
            exit 0
          fi
          mkdir -p "${HOME}/.docker/cli-plugins"
          curl -fsSL \
            https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o "${HOME}/.docker/cli-plugins/docker-compose"
          chmod +x "${HOME}/.docker/cli-plugins/docker-compose"
          docker compose version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.0.0

      - name: Create Docker network
        run: docker network create "${DOCKER_NETWORK:-mcp}" || true

      - name: Validate production compose
        run: docker compose --env-file .env.example -f docker-compose.prod.yml config --quiet

      - name: Validate development compose
        run: docker compose --env-file .env.example -f docker-compose.yml config --quiet

      - name: Build container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: config/Dockerfile
          push: false
          tags: soma:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── toml: taplo check ─────────────────────────────────────────────────────────
  toml:
    name: TOML Format
    needs: [changes]
    if: ${{ needs.changes.outputs.toml == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Install taplo
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: cargo:taplo-cli
          cache: true

      - name: taplo check
        run: taplo check

  # -- lefthook-speed: pre-commit must stay staged and fast ---------------------
  lefthook-speed:
    name: Lefthook Speed
    needs: [changes]
    if: ${{ (needs.changes.outputs.workflow == 'true' || needs.changes.outputs.soma == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check pre-commit hook speed policy
        run: python3 scripts/check_lefthook_pre_commit_speed.py

  # ── soma: generated docs, plugin layout, coupled files ───────────────────────
  soma:
    name: Soma Contracts
    needs: [changes]
    if: ${{ needs.changes.outputs.soma == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Check PATTERNS.md contracts
        run: cargo xtask patterns

      - name: Check test sibling coverage
        run: cargo xtask check-test-siblings

      - name: Validate plugin layout
        run: cargo xtask validate-plugin-layout

      - name: Check generated docs
        run: cargo xtask check-docs

      - name: Check stale Soma claims
        run: cargo xtask check-stale-claims

      - name: Check schema docs
        run: cargo xtask check-schema-docs --check

      - name: Check OpenAPI docs
        run: cargo xtask check-openapi --check

      - name: Check MCP registry manifest
        run: cargo xtask check-mcp-registry

      - name: Check provider manifest contract
        run: cargo xtask check-provider-manifest-contract

      - name: Check Palette manifest
        run: cargo xtask check-palette-manifest --check

      - name: Check scaffold intent contract
        run: cargo xtask check-scaffold-intent-contract

      - name: Check version-bearing files are in sync
        run: cargo xtask check-version-sync

      - name: Run Soma feature smoke tests
        run: cargo xtask test-soma-features

      - name: Check blob sizes
        run: cargo xtask check-blob-size --base origin/main --head HEAD

      - name: Check coupled files
        run: cargo xtask check-coupled-files origin/main HEAD

      - name: ASCII hygiene
        run: cargo xtask run-ascii-check

  # ── deny: dependency advisories, licenses, bans, sources ─────────────────────
  audit:
    name: Cargo Deny
    needs: [changes]
    if: ${{ needs.changes.outputs.security == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Install cargo-deny
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: aqua:EmbarkStudios/cargo-deny@0.19.8
          cache: true

      - name: cargo deny check
        run: cargo deny check all

  # ── gitleaks: secret scanning ─────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    needs: [changes]
    if: ${{ needs.changes.outputs.secrets == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # full history needed for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── ci-gate: single required status that aggregates every job ────────────────
  # Point branch protection at THIS job ("CI Gate") instead of each job below.
  # It fails if any needed job ended in anything other than success or skipped,
  # which closes the "a required check was silently skipped" merge hole.
  ci-gate:
    name: CI Gate
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    needs:
      - changes
      - actionlint
      - fmt
      - clippy
      - test
      - frontend-assets
      - build-linux
      - build-windows
      - mcp-smoke
      - container-smoke
      - toml
      - lefthook-speed
      - soma
      - audit
      - gitleaks
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 5
    steps:
      - name: Verify all required jobs passed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Upstream job results: ${RESULTS}"
          for result in ${RESULTS}; do
            if [ "${result}" != "success" ] && [ "${result}" != "skipped" ]; then
              echo "::error::A required CI job did not pass (result: ${result})"
              exit 1
            fi
          done
          echo "All required CI jobs passed or were skipped."
