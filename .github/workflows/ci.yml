# =============================================================================
# .github/workflows/ci.yml — Continuous Integration
#
# TEMPLATE substitutions required:
#   REPO_NAME   → your GitHub repo name (e.g. "myservice-mcp")
#   BINARY_NAME → your binary name from Cargo.toml [[bin]] (e.g. "myservice")
#
# This workflow runs on every push and PR to main.
# Jobs: fmt, clippy, test (nextest), web, toml, template checks, deny, gitleaks
#
# All jobs must pass before merging. Adjust the matrix rust-version to match
# your Cargo.toml `rust-version` field.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── fmt: cargo fmt --check ──────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable with rustfmt)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── clippy: zero warnings ────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable with clippy)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      # Cache Cargo registry and build artifacts between runs.
      # TEMPLATE: Change the cache key prefix from "rmcp-template" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rmcp-template-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rmcp-template-clippy-

      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  # ── test: cargo nextest run --profile ci ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # TEMPLATE: Change cache key prefix from "rmcp-template" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rmcp-template-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rmcp-template-test-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0 # cargo-nextest

      - name: cargo nextest run --profile ci
        run: cargo nextest run --profile ci

  # ── web: pnpm install, lint, audit, static build ─────────────────────────────
  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --prod --audit-level high

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm build
        run: pnpm build

  # ── toml: taplo check ─────────────────────────────────────────────────────────
  toml:
    name: TOML Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install taplo
        run: cargo install taplo-cli --locked

      - name: taplo check
        run: taplo check

  # ── template: generated docs, plugin layout, coupled files ───────────────────
  template:
    name: Template Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate plugin layout
        run: bash scripts/validate-plugin-layout.sh

      - name: Check schema docs
        run: python3 scripts/check-schema-docs.py --check

      - name: Run template feature smoke tests
        run: bash scripts/test-template-features.sh

      - name: Check blob sizes
        run: python3 scripts/check-blob-size.py --base origin/main --head HEAD

      - name: Check coupled files
        run: bash scripts/check-coupled-files.sh origin/main HEAD

      - name: ASCII hygiene
        run: |
          mapfile -t files < <(git ls-files '*.md' '*.rs' '*.toml' '*.json' '*.yml' '*.yaml' '*.sh' '*.py' ':!:docs/references/**' ':!:docs/sessions/**')
          python3 scripts/asciicheck.py "${files[@]}"

  # ── deny: dependency advisories, licenses, bans, sources ─────────────────────
  audit:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2
        with:
          command: check
          arguments: --all-features

  # ── gitleaks: secret scanning ─────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # full history needed for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
