# =============================================================================
# .github/workflows/ci.yml — Continuous Integration
#
# TEMPLATE substitutions required:
#   REPO_NAME   → your GitHub repo name (e.g. "myservice-mcp")
#   BINARY_NAME → your binary name from Cargo.toml [[bin]] (e.g. "myservice")
#
# This workflow runs on every push and PR to main.
# Jobs: actionlint, fmt, clippy, test (nextest), web, native builds, MCP smoke,
# compose/container smoke, toml, template checks, version sync, deny, gitleaks
#
# All jobs must pass before merging. Adjust the matrix rust-version to match
# your Cargo.toml `rust-version` field.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Force CI through sccache on both Linux and Windows. This also overrides the
  # repo's dev-only scripts/cargo-rustc-wrapper, whose local binary-sync side
  # effects are not wanted in CI and whose bash wrapper cannot run on Windows.
  RUSTC_WRAPPER: sccache
  CARGO_BUILD_RUSTC_WRAPPER: sccache
  SCCACHE_DIR: ${{ github.workspace }}/../.sccache
  # Keep Windows artifacts portable even on self-hosted runners whose user-level
  # Cargo config may contain target-cpu=native or machine-specific SIMD flags.
  WINDOWS_PORTABLE_RUSTFLAGS: >-
    -C target-cpu=x86-64
    -C target-feature=-avx512f,-avx512vl,-avx512bw,-avx512dq,-avx512cd,-avx512ifma,-avx512vbmi,-avx512vbmi2,-avx512vnni,-avx512bitalg,-avx512vpopcntdq

jobs:
  # -- actionlint: GitHub Actions workflow syntax and shell checks -------------
  actionlint:
    name: Actionlint
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@latest

  # ── fmt: cargo fmt --check ──────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── clippy: zero warnings ────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache
        with:
          components: clippy

      # Cache Cargo registry and build artifacts between runs.
      # TEMPLATE: Change the cache key prefix from "rmcp-template" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
          key: ${{ github.repository }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-clippy-

      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  # ── test: cargo nextest run --profile ci ─────────────────────────────────────
  test:
    name: Test
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      # TEMPLATE: Change cache key prefix from "rmcp-template" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
          key: ${{ github.repository }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-test-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0 # cargo-nextest

      - name: Build stdio test binary
        run: cargo build --bin rtemplate

      - name: cargo nextest run --profile ci
        run: cargo nextest run --profile ci

      - name: Upload nextest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextest-junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 14

  # ── web: pnpm install, lint, audit, static build ─────────────────────────────
  frontend-assets:
    name: Frontend Assets
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g "$(node -p "require('./package.json').packageManager")"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --prod --audit-level high

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm build
        run: pnpm build

      - name: Upload web export
        uses: actions/upload-artifact@v7
        with:
          name: web-out
          path: apps/web/out/
          if-no-files-found: error
          retention-days: 1

  # -- native release builds ----------------------------------------------------
  #
  # These jobs mirror the Axon pattern: prove the binary builds on Linux and on
  # native Windows during PR CI, then upload the runnable artifacts for manual
  # smoke testing. Release tags still use .github/workflows/release.yml for
  # packaging and GitHub Release publication.
  build-linux:
    name: Build Linux
    runs-on: [self-hosted, linux-lab, rmcp-template]
    needs: frontend-assets
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
          key: ${{ github.repository }}-build-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-build-linux-

      - name: cargo build local binary
        run: cargo build --release --locked --bin rtemplate --no-default-features --features local-adapter

      - name: cargo build server binary
        run: cargo build --release --locked --bin rtemplate-server --features full

      - name: Upload Linux binary
        uses: actions/upload-artifact@v7
        with:
          name: rtemplate-linux-x86_64
          path: target/release/rtemplate
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: [self-hosted, Windows, rmcp-template, steamy]
    needs: frontend-assets
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Show Windows Rust CPU flags and sccache
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: |
          $ErrorActionPreference = 'Continue'
          rustc -vV
          sccache --version
          "RUSTC_WRAPPER=$env:RUSTC_WRAPPER"
          "CARGO_BUILD_RUSTC_WRAPPER=$env:CARGO_BUILD_RUSTC_WRAPPER"
          "SCCACHE_DIR=$env:SCCACHE_DIR"
          "RUSTFLAGS=$env:RUSTFLAGS"
          rustc --print cfg | Select-String 'target_feature'
          cargo config get build.rustflags --merged
          if ($LASTEXITCODE -ne 0) { "build.rustflags not set" }
          cargo config get target.x86_64-pc-windows-msvc.rustflags --merged
          if ($LASTEXITCODE -ne 0) { "target rustflags not set" }
          exit 0

      - name: cargo test
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: |
          $ErrorActionPreference = "Stop"
          $process = Start-Process `
            -FilePath cargo `
            -ArgumentList @("test", "--locked", "--all-targets") `
            -NoNewWindow `
            -PassThru

          while (-not $process.HasExited) {
            Start-Sleep -Seconds 60
            if (-not $process.HasExited) {
              Write-Host "Windows cargo test still running at $(Get-Date -Format o)"
            }
          }

          exit $process.ExitCode

      - name: cargo build local binary
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: |
          $ErrorActionPreference = "Stop"
          $process = Start-Process `
            -FilePath cargo `
            -ArgumentList @("build", "--release", "--locked", "--bin", "rtemplate", "--no-default-features", "--features", "local-adapter") `
            -NoNewWindow `
            -PassThru

          while (-not $process.HasExited) {
            Start-Sleep -Seconds 60
            if (-not $process.HasExited) {
              Write-Host "Windows local binary build still running at $(Get-Date -Format o)"
            }
          }

          exit $process.ExitCode

      - name: cargo build server binary
        shell: pwsh
        env:
          RUSTFLAGS: ${{ env.WINDOWS_PORTABLE_RUSTFLAGS }}
        run: |
          $ErrorActionPreference = "Stop"
          $process = Start-Process `
            -FilePath cargo `
            -ArgumentList @("build", "--release", "--locked", "--bin", "rtemplate-server", "--features", "full") `
            -NoNewWindow `
            -PassThru

          while (-not $process.HasExited) {
            Start-Sleep -Seconds 60
            if (-not $process.HasExited) {
              Write-Host "Windows server binary build still running at $(Get-Date -Format o)"
            }
          }

          exit $process.ExitCode

      - name: Upload Windows binary
        uses: actions/upload-artifact@v7
        with:
          name: rtemplate-windows-x86_64
          path: target/release/rtemplate.exe
          if-no-files-found: error

  # -- mcp-smoke: live MCP HTTP tool/resource smoke through mcporter -----------
  mcp-smoke:
    name: MCP Smoke
    runs-on: [self-hosted, linux-lab, rmcp-template]
    needs: frontend-assets
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
          key: ${{ github.repository }}-mcp-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-mcp-smoke-

      - name: Install smoke test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          npm install -g mcporter@0.7.3

      - name: Build rtemplate server binary
        run: cargo build --locked --bin rtemplate-server --features full

      - name: Start MCP server
        env:
          RTEMPLATE_MCP_HOST: 127.0.0.1
          RTEMPLATE_MCP_PORT: 40123
          RTEMPLATE_MCP_NO_AUTH: "true"
          RUST_LOG: info,rmcp=warn
        run: |
          set -euo pipefail
          ./target/debug/rtemplate-server serve mcp > /tmp/rtemplate-mcp.log 2>&1 &
          echo "$!" > /tmp/rtemplate-mcp.pid
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:40123/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/rtemplate-mcp.log
          exit 1

      - name: Run mcporter smoke tests
        env:
          RTEMPLATE_MCP_HOST: 127.0.0.1
          RTEMPLATE_MCP_PORT: 40123
        run: bash crates/rmcp-template/tests/mcporter/test-mcp.sh --timeout-ms 20000

      - name: Upload MCP smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-smoke-logs
          path: |
            /tmp/rtemplate-mcp.log
            /tmp/test-mcp.*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stop MCP server
        if: always()
        run: |
          kill "$(cat /tmp/rtemplate-mcp.pid 2>/dev/null)" 2>/dev/null || true

  # -- container-smoke: compose config plus Docker build on PRs/main ------------
  container-smoke:
    name: Container Smoke
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Docker Compose
        run: |
          set -euo pipefail
          if docker compose version >/dev/null 2>&1; then
            docker compose version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin
          docker compose version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.0.0

      - name: Create Docker network
        run: docker network create "${DOCKER_NETWORK:-mcp}" || true

      - name: Validate production compose
        run: docker compose --env-file .env.example -f docker-compose.prod.yml config --quiet

      - name: Validate development compose
        run: docker compose --env-file .env.example -f docker-compose.yml config --quiet

      - name: Build container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: config/Dockerfile
          push: false
          tags: rmcp-template:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── toml: taplo check ─────────────────────────────────────────────────────────
  toml:
    name: TOML Format
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      # cargo install rather than taiki-e/install-action: taplo-cli has no
      # install-action prebuilt, so it falls back to cargo-binstall, which
      # conflicts with the cargo-binstall a mise-based self-hosted runner already
      # provides on PATH. cargo install is slower on a cold cache but reliable
      # everywhere; a persistent CARGO_HOME keeps it warm.
      - name: Install taplo
        run: cargo install taplo-cli --locked

      - name: taplo check
        run: taplo check

  # -- lefthook-speed: pre-commit must stay staged and fast ---------------------
  lefthook-speed:
    name: Lefthook Speed
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check pre-commit hook speed policy
        run: python3 scripts/check_lefthook_pre_commit_speed.py

  # ── template: generated docs, plugin layout, coupled files ───────────────────
  template:
    name: Template Contracts
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Check PATTERNS.md contracts
        run: cargo xtask patterns

      - name: Check test sibling coverage
        run: cargo xtask check-test-siblings

      - name: Validate plugin layout
        run: cargo xtask validate-plugin-layout

      - name: Check generated docs
        run: cargo xtask check-docs

      - name: Check stale template claims
        run: cargo xtask check-stale-claims

      - name: Check schema docs
        run: cargo xtask check-schema-docs --check

      - name: Check OpenAPI docs
        run: cargo xtask check-openapi --check

      - name: Check scaffold intent contract
        run: cargo xtask check-scaffold-intent-contract

      - name: Check release versions
        run: cargo xtask check-release-versions --base origin/main --head HEAD --mode pr

      - name: Run template feature smoke tests
        run: cargo xtask test-template-features

      - name: Check blob sizes
        run: cargo xtask check-blob-size --base origin/main --head HEAD

      - name: Check coupled files
        run: cargo xtask check-coupled-files origin/main HEAD

      - name: ASCII hygiene
        run: cargo xtask run-ascii-check

  # ── deny: dependency advisories, licenses, bans, sources ─────────────────────
  audit:
    name: Cargo Deny
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features

  # ── gitleaks: secret scanning ─────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # full history needed for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── ci-gate: single required status that aggregates every job ────────────────
  # Point branch protection at THIS job ("CI Gate") instead of each job below.
  # It fails if any needed job ended in anything other than success or skipped,
  # which closes the "a required check was silently skipped" merge hole.
  ci-gate:
    name: CI Gate
    if: always()
    needs:
      - actionlint
      - fmt
      - clippy
      - test
      - frontend-assets
      - build-linux
      - build-windows
      - mcp-smoke
      - container-smoke
      - toml
      - lefthook-speed
      - template
      - audit
      - gitleaks
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 5
    steps:
      - name: Verify all required jobs passed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Upstream job results: ${RESULTS}"
          for result in ${RESULTS}; do
            if [ "${result}" != "success" ] && [ "${result}" != "skipped" ]; then
              echo "::error::A required CI job did not pass (result: ${result})"
              exit 1
            fi
          done
          echo "All required CI jobs passed or were skipped."
