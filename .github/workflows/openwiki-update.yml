name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Set up mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: node npm:openwiki
          # No cache: cached installs kept resurrecting a better-sqlite3
          # binding compiled against an older Node ABI, in ways that survived
          # targeted rebuilds. A daily job can afford the fresh install.
          cache: false

      - name: Build openwiki native bindings
        # npm 11's allowScripts policy blocks better-sqlite3's install script
        # during the fresh install, so run it explicitly and prove the binding
        # loads before openwiki does.
        run: |
          sqlite_pkg="$(mise where npm:openwiki)/lib/node_modules/openwiki/node_modules/better-sqlite3"
          (cd "$sqlite_pkg" && rm -rf build prebuilds && npm run install --foreground-scripts)
          node -e "require('$sqlite_pkg')" \
            && echo "better-sqlite3 binding loads under $(node --version)"

      - name: Run OpenWiki
        # Invoke the bin script under the explicit `node` from this shell —
        # the same interpreter the load check above passes with. Going through
        # the mise shim resolves node differently on the runner and rejects
        # the just-verified binding with an ABI mismatch (run 29356180220:
        # identical file checksum, loads via `node`, fails via the shim).
        run: node "$(mise where npm:openwiki)/bin/openwiki" --update --print
        env:
          OPENWIKI_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          OPENWIKI_MODEL_ID: claude-opus-4.8

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
