name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Set up mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: node npm:openwiki
          # No cache: cached installs kept resurrecting a better-sqlite3
          # binding compiled against an older Node ABI, in ways that survived
          # targeted rebuilds. A daily job can afford the fresh install.
          cache: false

      - name: Build openwiki native bindings
        # Two traps here, both verified the hard way:
        # 1. npm 11's allowScripts policy blocks better-sqlite3's install
        #    script during the fresh install, so run it explicitly.
        # 2. The mise node/npm shims resolve per-cwd: inside the package dir
        #    (outside this repo, no .mise.toml) they fall back to the runner's
        #    system node 22, so prebuild-install fetched an ABI-127 binding.
        #    Pin node and npm by absolute path resolved at repo cwd.
        # The check constructs a Database — a bare require() never dlopens the
        # native module, which made earlier require-based checks vacuous.
        run: |
          node_abs="$(node -e 'console.log(process.execPath)')"
          npm_cli="$(mise where node)/lib/node_modules/npm/bin/npm-cli.js"
          sqlite_pkg="$(mise where npm:openwiki)/lib/node_modules/openwiki/node_modules/better-sqlite3"
          (cd "$sqlite_pkg" && rm -rf build prebuilds \
            && "$node_abs" "$npm_cli" run install --foreground-scripts)
          "$node_abs" -e "const D = require('$sqlite_pkg'); new D(':memory:').close(); console.log('sqlite native binding OK under ' + process.version)"

      - name: Run OpenWiki
        # Same interpreter the dlopen check above passes with — shim
        # resolution must stay out of the equation.
        run: node "$(mise where npm:openwiki)/bin/openwiki" --update --print
        env:
          OPENWIKI_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          OPENWIKI_MODEL_ID: claude-opus-4.8

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
