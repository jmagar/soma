name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Set up mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: node npm:openwiki
          cache: true

      - name: Rebuild openwiki native bindings
        # The mise cache can restore an openwiki install whose better-sqlite3
        # binding was compiled against an older Node ABI; rebuild it against
        # the Node this run actually uses.
        run: |
          openwiki_pkg="$(mise where npm:openwiki)/lib/node_modules/openwiki"
          # npm rebuild silently skips install scripts not covered by npm's
          # allowScripts policy, and prebuild-install exits 0 without touching
          # an already-present binary — so drop the stale build output and run
          # the install script directly, forcing a fetch for the current ABI.
          cd "$openwiki_pkg/node_modules/better-sqlite3"
          rm -rf build prebuilds
          npm run install --foreground-scripts
          node -e "require('$openwiki_pkg/node_modules/better-sqlite3')" \
            && echo "better-sqlite3 binding loads under $(node --version)"

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          OPENWIKI_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          OPENWIKI_MODEL_ID: claude-opus-4.8

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
