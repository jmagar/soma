# =============================================================================
# .github/workflows/release.yml — Build release binaries and GitHub Release
#
# CUSTOMIZATION NOTES:
#   BINARY_NAME  → your binary name from Cargo.toml [[bin]] (e.g. "myservice")
#   REPO_NAME    → your GitHub repo name (e.g. "myservice-mcp")
#
# Customize binary-name references in this file if you fork Soma.
#
# Triggers: release-please publishes a GitHub Release, or manual rerun for a tag.
#
# What this does:
#   1. Builds release binaries for linux/amd64 and windows/amd64
#   2. Copies binaries to bin/ and commits via Git LFS
#   3. Publishes the soma-rmcp npm launcher package
#   4. Creates a GitHub Release with binaries as downloadable assets
#   5. The commit in step 2 updates the LFS pointer so plugin install.sh
#      can `git lfs pull` the binary without building from source
#
# CUSTOMIZE: After creating your first real release, update install.sh to
#           reference the correct GitHub release download URL pattern.
# =============================================================================

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to attach artifacts to
        required: true

env:
  # CUSTOMIZE: Replace "soma" with your binary name.
  BINARY_NAME: soma
  CARGO_INCREMENTAL: "0"
  # Release builds use sccache, while still overriding the repo's dev-only
  # scripts/cargo-rustc-wrapper so it cannot auto-sync binaries into ./bin before
  # the release packaging step.
  RUSTC_WRAPPER: sccache
  CARGO_BUILD_RUSTC_WRAPPER: sccache
  SCCACHE_DIR: ${{ github.workspace }}/../.sccache
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

jobs:
  validate-release-tag:
    name: Validate release tag
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release artifacts must be published from a semver tag like v1.2.3, got ${tag}" >&2
            exit 1
          fi
          git fetch --force --tags origin main
          tag_commit="$(git rev-parse -q --verify "refs/tags/${tag}^{commit}" || true)"
          if [[ -z "${tag_commit}" ]]; then
            echo "Release tag ${tag} does not exist as refs/tags/${tag}" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "Release tag ${tag} is not reachable from origin/main" >&2
            exit 1
          fi
          version="${tag#v}"
          cargo_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' crates/soma/Cargo.toml | head -n 1)"
          npm_version="$(python3 -c 'import json; print(json.load(open("packages/soma-rmcp/package.json"))["version"])')"
          if [[ "${cargo_version}" != "${version}" ]]; then
            echo "crates/soma/Cargo.toml version ${cargo_version} does not match ${tag}" >&2
            exit 1
          fi
          if [[ "${npm_version}" != "${version}" ]]; then
            echo "packages/soma-rmcp/package.json version ${npm_version} does not match ${tag}" >&2
            exit 1
          fi
          cargo xtask check-version-sync
          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"

  frontend-assets:
    name: Frontend Assets
    needs: validate-release-tag
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate-release-tag.outputs.release_tag }}

      - name: Set up mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: node pnpm
          cache: true

      - name: Build web assets
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload web export
        uses: actions/upload-artifact@v7
        with:
          name: web-out
          path: apps/web/out/
          if-no-files-found: error
          retention-days: 1

  # ── Build release binaries ────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: [self-hosted, tootie, rmcp-template]
    needs: [validate-release-tag, frontend-assets]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux/amd64 — most common deployment target
          - target: x86_64-unknown-linux-gnu
            arch: linux-x86_64
            ext: ""
          # windows/amd64 — cross-compiled via MinGW
          - target: x86_64-pc-windows-gnu
            arch: windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate-release-tag.outputs.release_tag }}

      - name: Download web export
        uses: actions/download-artifact@v8
        with:
          name: web-out
          path: apps/web/out

      - name: Install Rust target and sccache
        uses: ./.github/actions/setup-rust-sccache
        with:
          targets: ${{ matrix.target }}

      # Cross-compilation toolchain for Windows on Linux runners.
      - name: Install cross-compilation tools (windows only)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      # CUSTOMIZE: If you need OpenSSL, add it here:
      #   sudo apt-get install -y libssl-dev
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            target
          # CUSTOMIZE: Change "soma" to your repo name.
          key: ${{ github.repository }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-release-${{ matrix.target }}-

      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
            --bin ${{ env.BINARY_NAME }} --features full

      - name: Prepare binary artifact
        run: |
          mkdir -p package artifacts
          # CUSTOMIZE: Replace the binary name if you fork Soma.
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }} \
             package/${{ env.BINARY_NAME }}${{ matrix.ext }}
          chmod +x package/${{ env.BINARY_NAME }}${{ matrix.ext }}
          tar -C package -czf artifacts/${{ env.BINARY_NAME }}-${{ matrix.arch }}.tar.gz \
            ${{ env.BINARY_NAME }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.arch }}
          path: artifacts/

  # ── Commit binaries to bin/ via Git LFS ──────────────────────────────────────
  #
  # SECURITY NOTE: This job pushes directly to `main` from a
  # tag-triggered workflow using GITHUB_TOKEN. This bypasses branch protection
  # if your repo has it enabled. Options:
  #   1. Disable this job if you distribute binaries via Release assets only.
  #   2. Replace GITHUB_TOKEN with a narrowly-scoped PAT (repo:contents write).
  #   3. Push to a dedicated `binaries` branch instead of `main`.
  # The push is intentional — it updates LFS pointers so `git lfs pull` works
  # in the Claude plugin install flow. Audit before enabling in production repos.
  lfs-commit:
    name: Commit binaries to bin/ (Git LFS)
    needs: [validate-release-tag, build]
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          lfs: true
          # Use a deploy key or token with write access to push the commit.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward main
        run: |
          git fetch --force --tags origin main
          git merge --ff-only origin/main

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Copy binaries to bin/
        run: |
          set -euo pipefail
          mkdir -p bin
          BIN=${{ env.BINARY_NAME }}

          # Each artifact dir is named <binary>-<arch> and contains one tarball.
          # merge-multiple flattens all artifact contents into artifacts/ directly.
          tar -xz -C bin -f artifacts/${BIN}-linux-x86_64.tar.gz
          mv bin/${BIN} bin/${BIN}-linux-amd64

          tar -xz -C bin -f artifacts/${BIN}-windows-x86_64.tar.gz
          mv bin/${BIN}.exe bin/${BIN}-windows-amd64.exe

          chmod +x bin/${BIN}-linux-amd64

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit LFS binaries
        run: |
          git add bin/
          if git diff --staged --quiet; then
            echo "No binary pointer changes to commit for ${{ needs.validate-release-tag.outputs.release_tag }}"
          else
            git commit -m "chore: release binaries ${{ needs.validate-release-tag.outputs.release_tag }}"
            git push origin HEAD:main
          fi

  # ── Publish npm launcher package ────────────────────────────────────────────
  npm:
    name: Publish soma-rmcp to npm
    needs: [validate-release-tag, release]
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/soma-rmcp

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate-release-tag.outputs.release_tag }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"
          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "package.json version ${package_version} does not match tag ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Check whether npm version already exists
        id: published
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version --json >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Inspect package contents
        if: steps.published.outputs.exists != 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.published.outputs.exists != 'true'
        run: npm publish --access public --provenance

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate-release-tag, build, lfs-commit]
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate-release-tag.outputs.release_tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum ./* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate-release-tag.outputs.release_tag }}
          fail_on_unmatched_files: true
          files: artifacts/*
