# =============================================================================
# .github/workflows/docs.yml — Rust API documentation (rustdoc) build + Pages
#
# Builds `cargo doc` for the full workspace with warnings as errors, uploads
# the rendered HTML as a Pages artifact on every run (so PRs validate docs),
# and deploys that artifact to GitHub Pages on pushes to main.
#
# Kept as its own workflow (rather than a job in ci.yml) so the broader
# `pages: write` / `id-token: write` permissions stay scoped to this file
# only. ci.yml retains the tighter `contents: read`.
#
# Branch-protection note (this is a private repo): the `rustdoc` job is
# path-skipped for non-Rust changes. Require the aggregate `Docs` status
# check rather than this individual job — same pattern as the `CI Gate` /
# `MSRV Gate` aggregates documented in CLAUDE.md.
# =============================================================================

name: Docs

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Pages deploy needs these. The build-only job below overrides to
# contents: read so the wider scope applies only to the deploy job.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow concurrent PR builds, but serialize main-branch deploys so only the
# latest push lands on Pages.
concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTDOCFLAGS: "-D warnings"

jobs:
  # ── rustdoc: build + upload Pages artifact ─────────────────────────────────
  # Always runs on path match. PRs validate the build (the -D warnings gate)
  # and produce an artifact for download, but do not deploy.
  rustdoc:
    name: Build rustdoc
    runs-on: [self-hosted, unraid]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust and soldr
        uses: ./.github/actions/setup-rust-soldr

      # Reuse the clippy/test cache key scheme so warm artifacts carry over
      # from sibling CI jobs on the same runner.
      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            target
          key: ${{ github.repository }}-rustdoc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-rustdoc-

      # Public items only, no dependency docs, all features — the documented
      # doc-build posture. `--strict` is the rustdoc gate (RUSTDOCFLAGS
      # -D warnings; the env above keeps that true for any direct cargo doc
      # invocations too). Beyond the rustdoc build, xtask also writes the
      # Pages entry points: target/doc/index.html (workspace crate landing
      # page) and target/doc/openapi.{html,json} (REST contract rendered
      # with Redoc) — no workflow-side HTML here.
      - name: cargo xtask doc --strict
        run: cargo xtask doc --strict

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: target/doc

  # ── pages: deploy the artifact to GitHub Pages ─────────────────────────────
  # Main branch only — PR builds validate via the rustdoc job above but never
  # publish. Requires Pages to be configured in repo Settings → Pages → Source
  # = "GitHub Actions".
  pages:
    name: Deploy to Pages
    needs: rustdoc
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: [self-hosted, unraid]
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v4.0.0
