name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

env:
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: sccache
  CARGO_BUILD_RUSTC_WRAPPER: sccache
  SCCACHE_DIR: ${{ github.workspace }}/../.sccache

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release tags
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Build release plan
        run: cargo xtask release-plan --head HEAD --mode main --json > release-plan.json

      - name: Build matrix
        id: matrix
        run: |
          set -euo pipefail
          matrix=$(jq -c '{include: [.[] | select(.changed == true)]}' release-plan.json)
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          jq . release-plan.json

  release:
    name: Create release tag
    needs: plan
    if: needs.plan.outputs.matrix != '{"include":[]}'
    runs-on: [self-hosted, linux-lab, rmcp-template]
    timeout-minutes: 20
    permissions:
      contents: write
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Wait for CI to pass on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 1800))
          while (( SECONDS < deadline )); do
            run="$(
              curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${API_URL}/repos/${REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&event=push&head_sha=${SHA}&per_page=20" \
                | jq -r '.workflow_runs[0] // empty | @base64'
            )"
            if [[ -n "$run" ]]; then
              status=$(printf '%s' "$run" | base64 -d | jq -r '.status')
              conclusion=$(printf '%s' "$run" | base64 -d | jq -r '.conclusion // ""')
              if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
                exit 0
              fi
              if [[ "$status" == "completed" ]]; then
                echo "CI completed with conclusion=${conclusion}" >&2
                exit 1
              fi
            fi
            sleep 20
          done
          echo "Timed out waiting for CI on ${SHA}" >&2
          exit 1

      - name: Create and push tag
        env:
          TAG: ${{ matrix.candidate_tag }}
          COMPONENT: ${{ matrix.id }}
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${COMPONENT} ${VERSION}"
          git push origin "${TAG}"
