# =============================================================================
# .github/workflows/docker-publish.yml — Build and publish Docker image
#
# CUSTOMIZATION NOTES:
#   REPO_NAME    → your GitHub repo name (e.g. "myservice-mcp")
#   IMAGE_NAME   → your Docker image name (e.g. "myservice-mcp")
#   BINARY_NAME  → your binary name from Cargo.toml [[bin]] (e.g. "myservice")
#   PORT         → your service port (e.g. 6970 for unraid, 9158 for gotify)
#
# Customize the image and binary names
# in this file with your actual values.
#
# Triggers:
#   - release-please publishes a GitHub Release
#   - manual workflow_dispatch for rerunning an existing tag
#
# Registry: ghcr.io/jmagar/<IMAGE_NAME>
# CUSTOMIZE: Replace "jmagar" with your GitHub org/username.
# =============================================================================

name: Docker Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish Docker/MCP artifacts for
        required: true

env:
  # CUSTOMIZE: Replace "jmagar/soma" with "your-org/your-image-name"
  IMAGE_NAME: ghcr.io/jmagar/soma
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  # Set this as a GitHub Actions repository variable instead of committing the
  # domain into Soma: gh variable set MCP_REGISTRY_DOMAIN --body <domain>
  MCP_REGISTRY_DOMAIN: ${{ vars.MCP_REGISTRY_DOMAIN }}

jobs:
  docker:
    name: Build & Push Docker image
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Determine the Docker tags to push:
      #   main branch  → :latest
      #   v1.2.3 tag   → :1.2.3 AND :latest
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # CUSTOMIZE: Replace "soma" with your image name.
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      # Multi-platform build and push.
      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          # CUSTOMIZE: Dockerfile lives at config/Dockerfile.
          file: config/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Trivy vulnerability scan ─────────────────────────────────────────────────
  trivy:
    name: Trivy Vulnerability Scan
    needs: docker
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a0b350d16c55eb73629 # 0.31.0
        with:
          # CUSTOMIZE: Replace with your image name.
          image-ref: ghcr.io/jmagar/soma:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  registry:
    name: Publish MCP Registry Manifest
    needs: docker
    if: ${{ startsWith(github.event.release.tag_name || inputs.tag || github.ref_name, 'v') }}
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Prepare server.json for tag
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import os

          path = Path("server.json")
          raw = path.read_text()
          data = json.loads(raw[raw.index("{"):])

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          image = f"{os.environ['IMAGE_NAME']}:{version}"
          data["version"] = version
          for package in data.get("packages", []):
              package["version"] = version
              if package.get("registryType") == "oci":
                  package["identifier"] = image
          publisher = data.get("_meta", {}).get("io.modelcontextprotocol.registry/publisher-provided", {})
          distribution = publisher.get("distribution")
          if isinstance(distribution, dict):
              distribution["ociImage"] = image

          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Publish to MCP Registry
        env:
          MCP_PRIVATE_KEY: ${{ secrets.MCP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MCP_PRIVATE_KEY:-}" ]; then
            echo "MCP_PRIVATE_KEY is not configured; skipping MCP registry publish."
            exit 0
          fi
          ./mcp-publisher login dns \
            --domain "${MCP_REGISTRY_DOMAIN}" \
            --private-key "${MCP_PRIVATE_KEY}"
          ./mcp-publisher publish
