name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    # Weekly scan on Wednesdays at 08:00 UTC
    - cron: "0 8 * * 3"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Disable the repo's dev-only rustc-wrapper for CI (see ci.yml).
  CARGO_BUILD_RUSTC_WRAPPER: ""

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: [self-hosted, Linux, rmcp-template, dookie]
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [rust, javascript-typescript]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Cache Cargo
        if: matrix.language == 'rust'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
          key: ${{ github.repository }}-codeql-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-codeql-

      - name: Install pnpm
        if: matrix.language == 'rust'
        working-directory: apps/web
        run: npm install -g "$(node -p "require('./package.json').packageManager")"

      - name: Build web assets
        if: matrix.language == 'rust'
        working-directory: apps/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build
        if: matrix.language == 'rust'
        run: cargo build --release --bins --features full

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: "/language:${{ matrix.language }}"
