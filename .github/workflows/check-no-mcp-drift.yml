name: Check no-MCP drift

on:
  schedule:
    - cron: "59 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: [self-hosted, Linux, rmcp-template, dookie]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable

      - name: Check no-MCP branch drift
        run: cargo xtask check-no-mcp-drift --compare-ref
