name: Check no-MCP drift

on:
  schedule:
    - cron: "59 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  SOLDR_CACHE_DIR: ${{ github.workspace }}/../.soldr-cache

jobs:
  check:
    runs-on: [self-hosted, unraid]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: Install Rust and soldr
        uses: ./.github/actions/setup-rust-soldr

      - name: Check no-MCP branch drift
        run: cargo xtask check-no-mcp-drift --compare-ref
