name: Check no-MCP drift

on:
  schedule:
    - cron: "59 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: sccache
  CARGO_BUILD_RUSTC_WRAPPER: sccache
  SCCACHE_DIR: ${{ github.workspace }}/../.sccache

jobs:
  check:
    runs-on: [self-hosted, tootie, rmcp-template]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Check no-MCP branch drift
        run: cargo xtask check-no-mcp-drift --compare-ref
