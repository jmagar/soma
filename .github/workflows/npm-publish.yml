name: NPM Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish soma-rmcp
    runs-on: [self-hosted, tootie, rmcp-template]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/soma-rmcp

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "package.json version ${package_version} does not match tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Check whether npm version already exists
        id: published
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version --json >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Inspect package contents
        if: steps.published.outputs.exists != 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.published.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
