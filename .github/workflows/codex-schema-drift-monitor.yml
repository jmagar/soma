# =============================================================================
# .github/workflows/codex-schema-drift-monitor.yml — scheduled codex
# app-server protocol drift watch
#
# Diffs the vendored crates/shared/codex-app-server-client/schema/methods.json
# against whatever `codex` CLI happens to be on the self-hosted runner's PATH,
# and opens/updates a GitHub issue when the method surface has drifted.
#
# Scheduled (not per-PR), because:
#   - the drift check needs a live `codex` CLI to generate a fresh schema
#     dump, and self-hosted runners are not guaranteed to have one installed
#     (this workflow does not install it - see the "why no install step"
#     note below), so gating a PR-blocking job on it would be flaky;
#   - drift only appears when someone upgrades the `codex` CLI on the runner,
#     which is independent of what any given PR touches - a path-gated
#     per-PR job (`crates/shared/codex-app-server-client/schema/**`) would
#     miss the case that matters most: upstream `codex` moved but nobody
#     touched this repo yet;
#   - `cargo xtask codex-schema drift` already treats "no codex on PATH" as
#     a graceful, non-fatal skip (exit 0), so a schedule that quietly no-ops
#     until a maintainer installs `codex` on the runner is the intended
#     steady state, not a workaround.
#
# This mirrors rmcp-release-monitor.yml's issue-lifecycle pattern (hidden
# HTML-comment marker to find/update/close the tracking issue) rather than
# inventing a new one - see docs/CI.md's "GitHub workflows" section.
#
# Why no "install codex" step: installing the codex CLI is out of scope for
# this drift check (it only owns diffing, not provisioning), and doing so
# here would silently couple this workflow to a package name/registry this
# repo doesn't otherwise depend on. If `codex` is present on the runner
# (e.g. installed as part of normal AI-tooling provisioning), this job uses
# it; if not, it reports "skipped" and exits 0 - no issue is filed or
# touched on a skip, since a skip is not evidence of drift either way.
# =============================================================================

name: codex schema drift monitor

on:
  schedule:
    # Daily at 07:53 UTC. Offset minute avoids the scheduled-workflow stampede.
    - cron: "53 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Diff installed codex app-server schema vs vendored
    runs-on: [self-hosted, unraid]
    timeout-minutes: 15
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      CARGO_BUILD_RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/../.sccache
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: gh
          cache: true

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Run codex-schema drift check
        id: drift
        run: |
          set -euo pipefail
          cargo xtask codex-schema drift --json | tee codex-schema-drift.json

          if jq -e '.skipped == true' codex-schema-drift.json >/dev/null 2>&1; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "in_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            in_sync="$(jq -r '.in_sync' codex-schema-drift.json)"
            echo "in_sync=${in_sync}" >> "$GITHUB_OUTPUT"
          fi

      - name: Render human-readable drift report
        if: steps.drift.outputs.skipped == 'false' && steps.drift.outputs.in_sync == 'false'
        run: cargo xtask codex-schema drift > codex-schema-drift.txt

      - name: Open or update codex schema drift issue
        if: steps.drift.outputs.skipped == 'false' && steps.drift.outputs.in_sync == 'false'
        run: |
          set -euo pipefail
          existing="$(
            gh issue list \
              --state open \
              --search "codex-schema-drift-monitor in:body" \
              --json number \
              --jq ".[0].number // \"\""
          )"
          {
            echo "<!-- codex-schema-drift-monitor -->"
            echo
            echo "The vendored \`codex-app-server-client\` schema has drifted from the"
            echo "\`codex\` CLI installed on the monitoring runner. Regenerate it with:"
            echo
            echo '```'
            echo "codex app-server generate-json-schema --out /tmp/codex-schema --experimental"
            echo "cargo xtask codex-schema regen /tmp/codex-schema"
            echo '```'
            echo
            echo "<details><summary>Drift report</summary>"
            echo
            echo '```'
            cat codex-schema-drift.txt
            echo '```'
            echo
            echo "</details>"
          } > codex-schema-drift-issue.md
          if [ -n "$existing" ]; then
            gh issue edit "$existing" \
              --title "codex app-server schema drifted from vendored schema" \
              --body-file codex-schema-drift-issue.md
          else
            gh issue create \
              --title "codex app-server schema drifted from vendored schema" \
              --body-file codex-schema-drift-issue.md
          fi

      - name: Close resolved codex schema drift issue
        if: steps.drift.outputs.skipped == 'false' && steps.drift.outputs.in_sync == 'true'
        run: |
          set -euo pipefail
          existing="$(
            gh issue list \
              --state open \
              --search "codex-schema-drift-monitor in:body" \
              --json number \
              --jq ".[0].number // \"\""
          )"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --body "The vendored codex-app-server-client schema is back in sync with the installed codex CLI; closing this drift-monitor issue."
            gh issue close "$existing" \
              --comment "codex schema drift monitor resolved."
          fi
