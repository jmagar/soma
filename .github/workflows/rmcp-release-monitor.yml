name: rmcp release monitor

on:
  schedule:
    # Daily at 07:17 UTC. Offset minute avoids the scheduled-workflow stampede.
    - cron: "17 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitor:
    name: Watch rmcp crate releases
    runs-on: [self-hosted, unraid]
    timeout-minutes: 15
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      CARGO_BUILD_RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/../.sccache
      GH_TOKEN: ${{ github.token }}
      MCP_SCHEMA_PATH: schema/2025-11-25/schema.ts
      MCP_SCHEMA_RAW_URL: https://raw.githubusercontent.com/modelcontextprotocol/modelcontextprotocol/main/schema/2025-11-25/schema.ts
      MCP_SCHEMA_WEB_URL: https://github.com/modelcontextprotocol/modelcontextprotocol/blob/main/schema/2025-11-25/schema.ts
      MCP_CONFORMANCE_REPO: modelcontextprotocol/conformance
      MCP_CONFORMANCE_URL: https://github.com/modelcontextprotocol/conformance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: gh
          cache: true

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Fetch rmcp crate metadata
        run: |
          curl -fsSL \
            -H "User-Agent: jmagar/soma rmcp-release-monitor" \
            https://crates.io/api/v1/crates/rmcp \
            -o rmcp-crate.json

      - name: Fetch rmcp GitHub release notes
        run: |
          gh api \
            "repos/modelcontextprotocol/rust-sdk/releases?per_page=100" \
            > rmcp-releases.json

      - name: Fetch MCP schema
        run: |
          curl -fsSL "$MCP_SCHEMA_RAW_URL" -o mcp-schema-upstream.ts
          gh api \
            "repos/modelcontextprotocol/modelcontextprotocol/commits?path=${MCP_SCHEMA_PATH}&per_page=5" \
            > mcp-schema-commits.json

      - name: Fetch MCP conformance metadata
        run: |
          baseline="$(tr -d '[:space:]' < docs/references/mcp/conformance/main.sha)"
          gh api "repos/${MCP_CONFORMANCE_REPO}/commits/main" > mcp-conformance-head.json
          gh api "repos/${MCP_CONFORMANCE_REPO}/compare/${baseline}...main" \
            > mcp-conformance-compare.json

      - name: Render rmcp release issue body
        id: monitor
        run: |
          cargo xtask rmcp-release-monitor \
            --crate-json rmcp-crate.json \
            --releases-json rmcp-releases.json \
            --issue-body rmcp-release-issue.md \
            --schema-baseline docs/references/mcp/schema/2025-11-25/schema.ts \
            --schema-upstream mcp-schema-upstream.ts \
            --schema-commits-json mcp-schema-commits.json \
            --schema-url "$MCP_SCHEMA_WEB_URL" \
            --conformance-baseline docs/references/mcp/conformance/main.sha \
            --conformance-head-json mcp-conformance-head.json \
            --conformance-compare-json mcp-conformance-compare.json \
            --conformance-url "$MCP_CONFORMANCE_URL"

      - name: Open or update rmcp release issue
        if: steps.monitor.outputs.drift == 'true'
        run: |
          title="${{ steps.monitor.outputs.issue_title }}"
          existing="$(
            gh issue list \
              --state open \
              --search "rmcp-release-monitor in:body" \
              --json number \
              --jq ".[0].number // \"\""
          )"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" \
              --title "$title" \
              --body-file rmcp-release-issue.md
          else
            gh issue create \
              --title "$title" \
              --body-file rmcp-release-issue.md
          fi

      - name: Close resolved rmcp release issue
        if: steps.monitor.outputs.drift == 'false'
        run: |
          existing="$(
            gh issue list \
              --state open \
              --search "rmcp-release-monitor in:body" \
              --json number \
              --jq ".[0].number // \"\""
          )"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --body "The Soma rmcp pin, MCP schema baseline, and MCP conformance baseline are current; closing this release-monitor issue."
            gh issue close "$existing" \
              --comment "rmcp release monitor resolved."
          fi
