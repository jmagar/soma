# =============================================================================
# .github/workflows/scheduled.yml — periodic + on-demand maintenance scans
#
# Surfaces new RUSTSEC advisories on a weekly cadence without anyone pushing,
# and gives maintainers a manual button to re-run the full dependency audit
# (advisories + bans + licenses + sources) on demand.
#
# The per-PR `audit` job in ci.yml still gates merges; this workflow is the
# safety net that catches advisories filed against already-merged code.
#
# CUSTOMIZE: keep this file. Adjust the cron if 06:43 UTC Monday clashes with
# other scheduled load.
# =============================================================================

name: Scheduled

on:
  schedule:
    # Weekly, Monday 06:43 UTC. Off-peak; offset minute avoids the :00 stampede.
    - cron: "43 6 * * 1"
  workflow_dispatch:
    inputs:
      full_audit:
        description: "Run the full cargo-deny suite (advisories, bans, licenses, sources)"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  SOLDR_CACHE_DIR: ${{ github.workspace }}/../.soldr-cache

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── advisories: weekly RUSTSEC refresh + on-demand full dependency audit ──────
  advisories:
    name: Dependency Advisories
    runs-on: [self-hosted, unraid]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust and soldr
        uses: ./.github/actions/setup-rust-soldr

      - name: Install cargo-deny
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0 # cargo-deny
        with:
          tool: cargo-deny

      # Scheduled runs only refresh advisories (fast, the part that goes stale
      # between pushes). A manual dispatch can opt into the full suite.
      - name: cargo deny check (advisories)
        if: ${{ github.event_name == 'schedule' || !inputs.full_audit }}
        run: cargo deny check advisories

      - name: cargo deny check (full suite)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_audit }}
        run: cargo deny check all

  # NOTE: the soldr compile store is now a persistent host bind mount on the
  # runner farm (CACHE_MOUNTS soldr:/home/runner/.cache/soldr), shared across
  # runners and repos. Bounding it is handled where it belongs — zccache's own
  # LRU eviction plus the farm's host-side `prune-cache` — NOT a CI job. A
  # weekly `rm -rf` from inside one runner would race live builds on the other
  # runners and delete a cache shared by every repo. The earlier soldr-store-gc
  # job was removed for that reason.
