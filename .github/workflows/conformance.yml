name: MCP Conformance

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/conformance.yml"
      - "Justfile"
      - "conformance-baseline.yml"
      - "apps/soma/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Conformance suite to run"
        required: true
        default: "active"
        type: choice
        options:
          - active
          - draft
          - pending
          - all

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: Official MCP Conformance
    runs-on: [self-hosted, unraid]
    timeout-minutes: 30
    env:
      SUITE: ${{ github.event.inputs.suite || 'active' }}
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust and sccache
        uses: ./.github/actions/setup-rust-sccache

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install just
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0 # just
        with:
          tool: just

      - name: Run official conformance suite
        run: just conformance "$SUITE" 41060

      - name: Upload conformance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-conformance-${{ env.SUITE }}
          path: results/
          if-no-files-found: ignore
          retention-days: 14
