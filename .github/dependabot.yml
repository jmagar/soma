version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    # typify 0.7 consumes schemars 0.8's RootSchema API. Keep accepting
    # compatible 0.8 updates until typify supports schemars 1.x.
    ignore:
      - dependency-name: "schemars"
        update-types:
          - "version-update:semver-major"
    groups:
      rmcp:
        patterns:
          - "rmcp*"
      serde:
        patterns:
          - "serde*"
      tokio:
        patterns:
          - "tokio*"
      axum:
        patterns:
          - "axum*"
          - "tower*"
          - "hyper*"
      tracing:
        patterns:
          - "tracing*"
    # Other major version bumps remain enabled, including rmcp.
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      docker-actions:
        patterns:
          - "docker/*"
          - "aquasecurity/trivy-action"
      github-actions:
        patterns:
          - "actions/*"
          - "dtolnay/*"
          - "taiki-e/*"
          - "EmbarkStudios/*"
          - "gitleaks/*"
          - "github/codeql-action"
          - "dependabot/*"
          - "softprops/*"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/config"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      radix:
        patterns:
          - "@radix-ui/*"
    labels:
      - "dependencies"
      - "web"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"
