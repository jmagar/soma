# =============================================================================
# Cargo.toml — Workspace root for the rmcp-template project
#
# TEMPLATE: This is a cargo workspace containing two crates:
#   - . (the main library/binary crate)
#   - xtask/ (repo automation: dist, ci, symlink-docs, check-env)
#
# When creating your own server, rename "rmcp-template" and add your own
# workspace members if needed.
# =============================================================================

[workspace]
# TEMPLATE: Add any additional crates here (e.g. a shared types crate).
members = [
  ".",
  "crates/rtemplate-api",
  "crates/rtemplate-auth",
  "crates/rtemplate-cli",
  "crates/rtemplate-contracts",
  "crates/rtemplate-mcp",
  "crates/rtemplate-observability",
  "crates/rtemplate-plugin-support",
  "crates/rtemplate-runtime",
  "crates/rtemplate-service",
  "crates/rtemplate-test-support",
  "crates/rtemplate-web",
  "xtask",
]
resolver = "2"

[package]
name = "rmcp-template"
version = "0.4.1"
edition = "2021"
rust-version = "1.90"
description = "Template for building MCP servers with the rmcp crate"
license = "MIT"
autobins = false

[[bin]]
name = "rtemplate"
path = "src/bin/example.rs"
required-features = ["local-adapter"]

[[bin]]
name = "rtemplate-server"
path = "src/main.rs"
required-features = ["server"]

[dependencies]
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
axum = { version = "0.8", optional = true }
rtemplate-runtime = { path = "crates/rtemplate-runtime" }
rtemplate-api = { path = "crates/rtemplate-api", optional = true }
rtemplate-auth = { path = "crates/rtemplate-auth", optional = true }
rtemplate-cli = { path = "crates/rtemplate-cli", optional = true }
rtemplate-contracts = { path = "crates/rtemplate-contracts" }
rtemplate-mcp = { path = "crates/rtemplate-mcp", optional = true }
rtemplate-observability = { path = "crates/rtemplate-observability" }
rtemplate-plugin-support = { path = "crates/rtemplate-plugin-support", optional = true }
rtemplate-service = { path = "crates/rtemplate-service" }
rtemplate-web = { path = "crates/rtemplate-web", optional = true }
rmcp = { version = "1.7.0", default-features = false, optional = true }
serde_json = { version = "1", optional = true }
tower-http = { version = "0.6", features = ["cors", "limit", "trace"], optional = true }

[features]
default = ["full"]
cli = ["dep:rtemplate-cli", "dep:rtemplate-plugin-support"]
mcp = ["dep:rtemplate-mcp"]
mcp-stdio = ["mcp", "dep:rmcp", "rmcp/transport-io", "rtemplate-mcp/stdio"]
api = ["dep:rtemplate-api", "dep:rtemplate-auth"]
mcp-http = ["api", "mcp", "dep:axum", "dep:serde_json", "dep:tower-http", "rtemplate-mcp/http"]
web = ["api", "dep:rtemplate-web"]
local-adapter = ["cli", "mcp-stdio"]
server = ["cli", "api", "mcp-http", "mcp-stdio"]
full = ["local-adapter", "server", "web"]
test-support = ["rtemplate-mcp?/test-support"]

[dev-dependencies]
rmcp-template = { path = ".", features = ["test-support"] }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
rmcp = { version = "1.7.0", default-features = false, features = [
  "client",
  "transport-child-process",
] }
