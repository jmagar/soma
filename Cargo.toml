# =============================================================================
# Cargo.toml — Virtual workspace root for the rmcp-template project
#
# The runnable/library package lives in crates/rmcp-template. Keep new Rust code
# in workspace crates; the repository root has no src/ crate.
# =============================================================================

[workspace]
members = [
  "crates/rmcp-template",
  "crates/rtemplate-api",
  "crates/rtemplate-auth",
  "crates/rtemplate-cli",
  "crates/rtemplate-contracts",
  "crates/rtemplate-mcp",
  "crates/rtemplate-observability",
  "crates/rtemplate-plugin-support",
  "crates/rtemplate-runtime",
  "crates/rtemplate-service",
  "crates/rtemplate-test-support",
  "crates/rtemplate-web",
  "xtask",
]
resolver = "2"

# ── profiles ─────────────────────────────────────────────────────────────────
# release-fast: release-grade binary (optimized, stripped) but with cheap LTO and
# many codegen units so local iteration — `just sync-container`, container smoke
# loops — recompiles in a fraction of the full `release` time. Not for shipping;
# tags/publishes still build the canonical `release` profile.
[profile.release-fast]
inherits = "release"
lto = false
codegen-units = 16
strip = "symbols"
