[template]
cargo_generate_version = ">=0.23.0"
# This repo remains valid Rust/TOML rather than embedding Liquid placeholders.
# Rewrites are owned by `cargo xtask cargo-generate-post` after cargo-generate
# copies the tree, so cargo-generate should not try to Liquid-process source/docs
# assets.
include = [
  "cargo-generate.toml",
  "template/cargo-generate/post.rhai",
]
ignore = [
  "cargo-generate.toml",
  ".beads",
  ".cache",
  ".dolt",
  ".full-review",
  ".git",
  ".claude/worktrees",
  ".claude/worktrees/**",
  ".lavra",
  ".next",
  ".serena",
  ".superpowers",
  ".worktrees",
  "AGENTS.md",
  "GEMINI.md",
  "**/AGENTS.md",
  "**/GEMINI.md",
  "apps/web/.next",
  "apps/web/node_modules",
  "apps/web/node_modules/**",
  "**/node_modules",
  "**/node_modules/**",
  "target",
  "dist",
  "storage",
  "**/__pycache__",
  "*.pyc",
  "docs/references",
  "docs/CARGO_GENERATE.md",
  "mcp-server-inventory.md",
]

[placeholders]
package_name = { type = "string", prompt = "Cargo package/repo name", regex = "^[a-z][a-z0-9_-]*$", default = "myservice-mcp" }
crate_prefix = { type = "string", prompt = "Workspace crate prefix", regex = "^[a-z][a-z0-9_-]*$", default = "myservice" }
binary_name = { type = "string", prompt = "Local CLI/stdin MCP binary name", regex = "^[a-z][a-z0-9_-]*$", default = "myservice" }
server_binary_name = { type = "string", prompt = "Server binary name", regex = "^[a-z][a-z0-9_-]*$", default = "myservice-server" }
service_slug = { type = "string", prompt = "MCP tool/action service slug (Rust identifier-safe)", regex = "^[a-z][a-z0-9_]*$", default = "myservice" }
type_prefix = { type = "string", prompt = "Rust type prefix", regex = "^[A-Z][A-Za-z0-9]*$", default = "MyService" }
env_prefix = { type = "string", prompt = "Environment variable prefix", regex = "^[A-Z][A-Z0-9_]*$", default = "MYSERVICE" }
scope_prefix = { type = "string", prompt = "OAuth/MCP scope prefix", regex = "^[a-z][a-z0-9_-]*$", default = "myservice" }
default_port = { type = "string", prompt = "Default HTTP MCP port", regex = "^[0-9]{2,5}$", default = "40060" }
github_owner = { type = "string", prompt = "GitHub owner/org for docs", regex = "^[A-Za-z0-9_.-]+$", default = "jmagar" }
github_repo = { type = "string", prompt = "GitHub repo name for docs", regex = "^[A-Za-z0-9_.-]+$", default = "myservice-mcp" }
default_features = { type = "string", prompt = "Default Cargo features (comma-separated)", regex = "^[a-z0-9_,-]+$", default = "full" }

[hooks]
post = ["template/cargo-generate/post.rhai"]
