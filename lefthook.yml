# =============================================================================
# lefthook.yml — Fast local hooks
#
# CUSTOMIZE: Copy this file unchanged to any new server repo.
#           Install tools: just install-tools
#           Enable hooks: just install-hooks
#           Bootstrap both: just bootstrap
#
# Philosophy (Pattern §30):
#   Pre-commit hooks MUST be fast and NON-BLOCKING for developer flow.
#   Heavy checks belong in CI, not here. The 30-second rule: if a hook takes
#   more than 30 seconds, it belongs in CI.
#
# This file contains ONLY fast pre-commit hooks plus a path-aware pre-push
# router:
#   1. diff_check  — catch whitespace/conflict markers (instant)
#   2. toml_fmt    — catch TOML format errors on staged .toml files (< 1s)
#   3. env_guard   — block .env files with secrets from being committed (< 1s)
#   4. file_size   — block staged source monoliths before they land (< 1s)
#   5. lefthook_speed — keep this pre-commit stage fast (< 1s)
#
# Pre-push runs `scripts/ci/pre_push.py`, which chooses checks by changed
# paths, including moved app/MCP paths such as `apps/soma/tests/mcporter`.
# Full local validation remains opt-in with SOMA_FULL_PRE_PUSH=1.
#
# NOT in pre-commit (too slow / too blocking for rapid commits):
#   - cargo clippy    → runs in CI (.github/workflows/ci.yml)
#   - cargo test      → runs in CI (includes `cargo test --doc`; nextest skips doctests)
#   - cargo nextest   → runs in CI
#   - cargo fmt       → run manually with `cargo fmt`; CI catches violations
#   - cargo check     → too slow for every commit; use `just check` manually
#   - cargo audit     → network call; runs in CI
#   - just conformance → boots a server and runs the official MCP conformance suite; CI/manual only
#   - cargo xtask patterns → full-repo contract scan; runs in CI and `just soma-check`
#   - cargo xtask check-release-versions → PR/main release gate; runs in CI and release scripts
#   - cargo xtask doc --strict → rustdoc -D warnings gate; runs in CI (docs.yml) and `just doc-check`
#
# CUSTOMIZE: Resist the urge to add more hooks here. If something slows down
#           your commit flow, developers will start using --no-verify, which
#           defeats the purpose entirely.
# =============================================================================

pre-commit:
  # Run all hooks in parallel — they're independent and fast.
  parallel: true

  commands:
    # ── 1. diff_check ─────────────────────────────────────────────────────────
    # Catches merge conflict markers (<<<<<<, >>>>>>>, =======) and trailing
    # whitespace. Uses git's built-in check — no external tool required.
    diff_check:
      run: git --no-pager diff --check --cached

    # ── 2. toml_fmt ───────────────────────────────────────────────────────────
    # Runs taplo check only on staged .toml files — fast because it only checks
    # changed files, not the whole project.
    # CUSTOMIZE: Remove this hook if you don't use taplo.
    toml_fmt:
      glob: "*.toml"
      run: scripts/with_timeout.sh 30 -- taplo check {staged_files}

    # ── 3. env_guard ──────────────────────────────────────────────────────────
    # Prevents accidentally committing .env files containing real secrets.
    # Only .env.example is allowed. Any other .env* file is blocked.
    env_guard:
      run: >
        scripts/with_timeout.sh 30 --
        bash -c '
          if [ -x "./target/debug/xtask" ]; then
            ./target/debug/xtask block-env-commits;
          else
            cargo xtask block-env-commits;
          fi
        '

    # ── 4. file_size ──────────────────────────────────────────────────────────
    # Blocks staged production source files that exceed Soma line budgets.
    # Test files and Rust inline #[cfg(test)] modules are exempt.
    file_size:
      glob: "**/*.{rs,ts,tsx}"
      run: >
        scripts/with_timeout.sh 30 --
        bash -c '
          if [ -x "./target/debug/xtask" ]; then
            ./target/debug/xtask check-file-size;
          else
            cargo xtask check-file-size;
          fi
        '

    # ── 5. lefthook_speed ─────────────────────────────────────────────────────
    # Guard this file against accidentally reintroducing workspace-scale checks.
    lefthook_speed:
      glob: "lefthook.yml"
      run: scripts/with_timeout.sh 10 -- python3 scripts/check_lefthook_pre_commit_speed.py

pre-push:
  parallel: false
  commands:
    pre_push_router:
      run: python3 scripts/ci/pre_push.py
