[package]
name = "soma-self-update"
version = "0.1.0"
edition = "2024"
rust-version = "1.96"
description = "Standalone, transport-neutral binary self-update transaction for Rust services"
license = "MIT"
readme = "README.md"
publish = false

[package.metadata.soma-architecture]
layer = "shared"

[dependencies]
fs2 = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
thiserror = "2"
tokio = { version = "1", features = ["fs", "io-util", "process", "rt", "time"] }
url = "2"

[target.'cfg(unix)'.dependencies]
nix = { version = "0.31", features = ["process", "signal"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full"] }
