[package]
name = "soma-mcp-client"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Reusable outbound MCP client runtime for upstream discovery, pooling, and calls"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "shared"

[features]
default = []
oauth = ["rmcp/auth"]

[dependencies]
bytes = "1"
futures = "0.3"
http = "1"
process-wrap = { version = "9.1.0", default-features = false, features = ["tokio1", "process-group"] }
reqwest = { version = "0.13.2", default-features = false, features = ["json", "rustls-no-provider", "stream"] }
rmcp = { workspace = true, features = ["client", "transport-child-process", "transport-streamable-http-client-reqwest"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sse-stream = "0.2"
thiserror = "2"
tokio = { version = "1", features = ["io-util", "macros", "process", "rt-multi-thread", "sync", "time"] }
tokio-tungstenite = { version = "0.30", features = ["rustls-tls-webpki-roots"] }
tracing = "0.1"
url = "2"

[dev-dependencies]
axum = "0.8"
rmcp = { workspace = true, features = ["server", "transport-streamable-http-server"] }
tempfile = "3"
toml = "1.1"
