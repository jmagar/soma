[package]
name = "soma-mcp-proxy"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Reusable MCP proxy route projection helpers for upstream tools, resources, and prompts"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "shared"

[features]
default = []

[dependencies]
rmcp = { workspace = true }
soma-mcp-client = { workspace = true }
soma-mcp-server = { workspace = true }

[dev-dependencies]
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt"] }
