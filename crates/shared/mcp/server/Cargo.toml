[package]
name = "soma-mcp-server"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Reusable inbound MCP server helpers for response paging and protocol shaping"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "shared"

[features]
default = []
http = ["dep:tracing", "dep:url", "rmcp/transport-streamable-http-server"]

[dependencies]
rmcp = { workspace = true, features = ["server"] }
rmcp-traces = { workspace = true }
serde_json = "1"
tracing = { version = "0.1", optional = true }
url = { version = "2", optional = true }

[dev-dependencies]
serde_json = "1"
