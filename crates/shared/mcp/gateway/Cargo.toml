[package]
name = "soma-gateway"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Reusable MCP aggregation gateway runtime"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[features]
default = []
oauth = ["soma-mcp-client/oauth"]
codemode = ["dep:soma-codemode"]
openapi = ["codemode", "dep:soma-openapi", "soma-codemode/openapi"]
palette = ["codemode"]
protected-routes = []

[dependencies]
anyhow = "1"
bytes = "1"
futures = "0.3"
http = "1"
process-wrap = { version = "9.1.0", default-features = false, features = ["tokio1", "process-group"] }
reqwest = { version = "0.13.2", default-features = false, features = ["json", "rustls-no-provider", "stream"] }
rmcp = { version = "=2.2.0", default-features = false, features = ["client", "server", "transport-child-process", "transport-streamable-http-client-reqwest"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
soma-mcp-client = { path = "../client", default-features = false }
soma-mcp-proxy = { path = "../proxy", default-features = false }
soma-codemode = { path = "../../codemode", optional = true, default-features = false }
soma-openapi = { path = "../../openapi", optional = true, default-features = false }
sse-stream = "0.2"
thiserror = "2"
tokio = { version = "1", features = ["io-util", "macros", "process", "rt-multi-thread", "sync", "time"] }
tokio-tungstenite = { version = "0.29", features = ["rustls-tls-webpki-roots"] }
toml = "1.1"
tracing = "0.1"
url = "2"

[dev-dependencies]
axum = "0.8"
rmcp = { version = "=2.2.0", default-features = false, features = ["transport-streamable-http-server"] }
tempfile = "3"
