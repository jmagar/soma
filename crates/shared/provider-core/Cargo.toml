[package]
name = "soma-provider-core"
version = "0.4.1"
edition = "2024"
rust-version = "1.96"
authors.workspace = true
description = "Reusable provider contracts, catalogs, validation, and dispatch for Soma-derived runtimes"
homepage.workspace = true
license = "MIT"
repository.workspace = true
readme = "README.md"
keywords = ["providers", "registry", "runtime", "mcp"]
categories = ["development-tools", "web-programming"]

[package.metadata.soma-architecture]
layer = "shared"

[package.metadata.docs.rs]
all-features = true

[features]
default = ["preserve-order"]
preserve-order = ["serde_json/preserve_order"]

[dependencies]
async-trait = "0.1"
jsonschema = { version = "0.48", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
