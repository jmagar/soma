[package]
name = "soma-provider-core"
version = "0.4.1"
edition = "2024"
rust-version = "1.96"
authors.workspace = true
description = "Reusable provider contracts, catalogs, validation, and dispatch for Soma-derived runtimes"
homepage.workspace = true
license = "MIT"
repository.workspace = true
readme = "README.md"
keywords = ["providers", "registry", "runtime", "mcp"]
categories = ["development-tools", "web-programming"]

[package.metadata.soma-architecture]
layer = "shared"

[features]
default = []

[dependencies]
async-trait = "0.1"
jsonschema = { version = "0.47", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
serde_with = { version = "3", default-features = false, features = ["macros"] }
sha2 = "0.11"
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
