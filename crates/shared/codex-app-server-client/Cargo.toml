[package]
name = "codex-app-server-client"
version = "0.1.0"
edition = "2021"
rust-version = "1.96"
authors = ["dinglebear.ai <hello@dinglebear.ai>"]
description = "Standalone, fully-typed async Rust client for the Codex CLI's app-server v2 JSON-RPC protocol."
homepage = "https://soma.dinglebear.ai"
license = "MIT"
repository = "https://github.com/dinglebear-ai/soma"
publish = false

[package.metadata.soma-architecture]
layer = "shared"

# Deliberately has zero path-dependencies on other crates in this workspace -
# see README.md. Only external, published dependencies below.

[dependencies]
axum = { version = "0.8", optional = true }
# Only used by the optional `rest` feature: `futures-core` backs the manual
# `Stream` impl behind the SSE event route (`GET .../events/stream`), and
# `tower-layer`/`tower-service` back the optional `bearer_auth` middleware
# layer. All three are already transitive dependencies of `axum` itself, so
# depending on them directly (rather than pulling in `tower`'s full surface
# or a streaming-combinator crate like `async-stream`) adds no new crates to
# the dependency graph - see README.md for why this crate is fussy about
# keeping its dependency footprint to published, minimal crates.
futures-core = { version = "0.3", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tower-layer = { version = "0.3", optional = true }
tower-service = { version = "0.3", optional = true }
tokio = { version = "1", features = [
  "process",
  "io-util",
  "io-std",
  "sync",
  "rt",
  "macros",
  "time",
  "net",
] }
# Only `tokio_util::sync::CancellationToken` is used (for coordinated
# connection shutdown); that module has no feature gate, so no features are
# needed here.
tokio-util = { version = "0.7", default-features = false }
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }

[features]
default = []
# `tokio/rt-multi-thread` and `tokio/signal` are pulled in only by `rest`
# because only the `codex-app-server-rest` binary needs them: it runs a
# multi-threaded runtime (a real server, not the single-session examples) and
# installs SIGTERM/ctrl-c handlers for graceful shutdown. Gating them here
# keeps a library-only consumer (`features = []`) from paying for a runtime
# flavor and signal machinery it never runs.
rest = [
  "dep:axum",
  "dep:futures-core",
  "dep:tower-layer",
  "dep:tower-service",
  "tokio/rt-multi-thread",
  "tokio/signal",
]

[[bin]]
name = "codex-app-server-rest"
path = "src/bin/codex_app_server_rest.rs"
required-features = ["rest"]

[target.'cfg(unix)'.dependencies]
tokio = { version = "1", features = ["net"] }

[build-dependencies]
typify = { version = "0.7", default-features = false }
schemars = "0.8"
serde_json = "1"
# prettyplease 0.3 pretty-prints via syn 3's `File` type, so the build-script
# parser must be on syn 3 too — otherwise `prettyplease::unparse` receives a
# syn 2 `File` and fails to compile (E0308). Keep these two majors in lockstep.
prettyplease = "0.3"
syn = { version = "3", features = ["full"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
tower = { version = "0.5", features = ["util"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tempfile = "3"

[[example]]
name = "basic"

[[example]]
name = "rest_server"
required-features = ["rest"]

[[example]]
name = "rest_loopback_dev"
required-features = ["rest"]

[[example]]
name = "rest_bearer_auth"
required-features = ["rest"]

[[example]]
name = "rest_trusted_gateway"
required-features = ["rest"]

[[example]]
name = "rest_admin_unsafe"
required-features = ["rest"]
