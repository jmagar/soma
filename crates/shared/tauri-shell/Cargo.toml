[package]
name = "soma-tauri-shell"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Reusable Tauri desktop shell mechanics: window, tray, shortcut, blur, and persistence helpers"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "shared"

[features]
default = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-global-shortcut = "2"
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tempfile = "3"
