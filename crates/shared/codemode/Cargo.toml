[package]
name = "soma-codemode"
version = "0.0.0"
edition = "2021"
rust-version = "1.96"
license = "MIT"
publish = false
autobins = false

[package.metadata.soma-architecture]
layer = "shared"

[[bin]]
name = "soma-codemode-runner"
path = "src/bin/soma-codemode-runner.rs"

[[test]]
name = "soma-codemode-runner-bin"
path = "src/bin/soma-codemode-runner_tests.rs"

[features]
default = []
openapi = ["dep:reqwest", "dep:soma-openapi"]

[dependencies]
anyhow = "1"
futures = "0.3"
hex = "0.4"
regex = "1"
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls", "rustls-no-provider"], optional = true }
rquickjs = { version = "0.11", features = ["array-buffer", "disable-assertions"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
sha2 = "0.11"
# default-features = true is load-bearing: the workspace entry declares
# default-features = false (soma-gateway consumes it that way), and this crate
# historically enabled soma-openapi's default features.
soma-openapi = { workspace = true, optional = true, default-features = true }
tar = "0.4"
tempfile = "3"
thiserror = "2"
tokio = { version = "1", features = ["fs", "io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }
tokio-util = { version = "0.7", features = ["codec"] }
tracing = "0.1"
ulid = "3"
url = "2"

[target.'cfg(unix)'.dependencies]
nix = { version = "0.30", features = ["process", "signal", "user"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_Foundation", "Win32_Security", "Win32_System_JobObjects", "Win32_System_Threading"] }

[dev-dependencies]
serial_test = "3"
