[package]
name = "soma-api"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "REST API and HTTP server composition for soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-surface"

[features]
default = []
auth = ["dep:soma-auth"]
oauth = ["auth"]

[dependencies]
anyhow = "1"
axum = "0.8"
soma-auth = { workspace = true, optional = true, features = ["http-axum"] }
soma-application = { workspace = true }
soma-domain = { workspace = true }
soma-http-api = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
