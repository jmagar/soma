[package]
name = "soma-domain"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Product domain values and invariant rules for Soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-domain"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
soma-provider-core = { workspace = true }
thiserror = "2"

[lints]
workspace = true
