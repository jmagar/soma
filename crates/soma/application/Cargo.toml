[package]
name = "soma-application"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Transport-neutral product use cases for Soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-application"

[features]
default = []
client = ["soma-client/client", "soma-provider-core/preserve-order"]
observability = ["dep:metrics", "soma-client/observability"]

[dependencies]
anyhow = "1"
async-trait = "0.1"
base64 = "0.22"
jsonschema = "0.47"
metrics = { version = "0.24", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
soma-client = { workspace = true }
soma-domain = { workspace = true }
soma-provider-adapters = { workspace = true, features = [
  "ai-sdk",
  "gateway",
  "openapi",
  "python",
  "static-echo",
  "wasm",
] }
soma-provider-core = { workspace = true }
tracing = "0.1"
url = "2"

[dev-dependencies]
soma-config = { workspace = true }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
