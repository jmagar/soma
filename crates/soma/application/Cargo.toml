[package]
name = "soma-application"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Transport-neutral product use cases for Soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-application"

[features]
default = []
client = ["soma-service/client"]
observability = ["soma-service/observability"]

[dependencies]
anyhow = "1"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
soma-domain = { workspace = true }
soma-provider-core = { workspace = true }
soma-service = { workspace = true }

[dev-dependencies]
soma-client = { workspace = true }
soma-config = { workspace = true }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
