[package]
name = "soma-application"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Transport-neutral product use cases for Soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-application"

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
soma-contracts = { path = "../contracts" }
soma-domain = { path = "../domain" }
soma-service = { path = "../service" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
