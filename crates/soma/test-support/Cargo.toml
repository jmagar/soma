[package]
name = "soma-test-support"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Test helpers for soma crates"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-support"

[dependencies]
async-trait = "0.1"
soma-application = { path = "../application", default-features = false }
soma-api = { path = "../api", features = ["auth"] }
soma-auth = { path = "../../shared/auth", features = ["http-axum"] }
soma-contracts = { path = "../contracts" }
soma-service = { path = "../service", default-features = false, features = ["observability"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt"] }
