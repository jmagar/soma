[package]
name = "soma-test-support"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Test helpers for soma crates"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-support"

[dependencies]
async-trait = "0.1"
soma-application = { workspace = true, features = ["observability"] }
soma-api = { workspace = true, features = ["auth"] }
soma-auth = { workspace = true, features = ["http-axum"] }
soma-client = { workspace = true }
soma-config = { workspace = true }
soma-provider-core = { workspace = true }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt"] }
