[package]
name = "soma-cli"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "CLI surface for soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[dependencies]
anyhow = "1"
dirs = "6"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
soma-contracts = { path = "../contracts" }
soma-runtime = { path = "../runtime", default-features = false }
soma-service = { path = "../service", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt", "time"] }

[dev-dependencies]
async-trait = "0.1"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }
