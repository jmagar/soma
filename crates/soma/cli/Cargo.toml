[package]
name = "soma-cli"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "CLI surface for soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-surface"

[dependencies]
anyhow = "1"
dirs = "6"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
soma-application = { workspace = true }
soma-config = { workspace = true }
soma-domain = { workspace = true }
soma-provider-core = { workspace = true }
soma-runtime = { workspace = true }
soma-service = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt", "time"] }

[dev-dependencies]
soma-test-support = { workspace = true }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }
