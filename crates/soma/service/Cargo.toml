[package]
name = "soma-service"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Business service and upstream client for soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "legacy"

[features]
default = ["client", "observability"]
client = ["soma-provider-core/preserve-order"]
observability = ["dep:soma-observability", "dep:metrics"]
test-support = []

[dependencies]
anyhow = "1"
async-trait = "0.1"
base64 = "0.22"
jsonschema = "0.47"
metrics = { version = "0.24", optional = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
soma-contracts = { workspace = true }
soma-provider-adapters = { workspace = true, features = [
  "ai-sdk",
  "gateway",
  "openapi",
  "python",
  "static-echo",
  "wasm",
] }
soma-provider-core = { workspace = true }
soma-observability = { workspace = true, optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
tempfile = "3"
tokio = { version = "1", features = ["io-util", "process", "rt", "time"] }
tracing = "0.1"
url = "2"

[dev-dependencies]
axum = "0.8"
tokio = { version = "1", features = ["macros", "net", "process", "rt-multi-thread", "time"] }
