[package]
name = "soma-service"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Business service and upstream client for soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[features]
default = ["client", "observability"]
client = []
observability = ["dep:soma-observability", "dep:metrics"]
test-support = []

[dependencies]
anyhow = "1"
async-trait = "0.1"
base64 = "0.22"
jsonschema = "0.47"
metrics = { version = "0.24", optional = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
rmcp = { version = "=2.2.0", default-features = false, features = ["client", "transport-child-process", "transport-streamable-http-client-reqwest"] }
# rmcp >= 2.2 builds its HTTP transport on reqwest 0.13, which requires the
# process to install a rustls crypto provider before any TLS client is built.
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
soma-contracts = { path = "../contracts" }
soma-observability = { path = "../../shared/observability", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
tempfile = "3"
tokio = { version = "1", features = ["io-util", "process", "rt", "time"] }
tracing = "0.1"
url = "2"
wasmtime = { version = "46.0.1", default-features = false, features = ["anyhow", "cranelift", "runtime", "std"] }

[dev-dependencies]
axum = "0.8"
tokio = { version = "1", features = ["macros", "net", "process", "rt-multi-thread", "time"] }
