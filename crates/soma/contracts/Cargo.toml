[package]
name = "soma-contracts"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Shared contracts, config, action metadata, and schemas for soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "legacy"

[dependencies]
anyhow = "1"
dirs = "6"
dotenvy = "0.15.7"
schemars = "1.2.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
toml = "1.1"
soma-provider-core = { path = "../../shared/provider-core", default-features = false }

[dev-dependencies]
# Serializes tests that mutate process-global env so `cargo test` (shared
# process; unlike nextest's process-per-test) cannot race on env state.
serial_test = "3"
