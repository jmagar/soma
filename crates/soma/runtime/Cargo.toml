[package]
name = "soma-runtime"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "Shared runtime state and auth policy for soma surfaces"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-runtime"

[features]
default = []
auth = ["dep:soma-auth"]
oauth = ["auth", "soma-gateway/oauth"]
protected-routes = ["soma-gateway/protected-routes"]

[dependencies]
anyhow = "1"
soma-auth = { workspace = true, optional = true, features = ["http-axum"] }
soma-application = { workspace = true }
soma-config = { workspace = true }
soma-domain = { workspace = true }
soma-gateway = { workspace = true }
soma-mcp-server = { workspace = true }
tracing = "0.1"
url = "2"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
