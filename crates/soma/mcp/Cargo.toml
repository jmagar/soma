[package]
name = "soma-mcp"
version = "0.4.1"
edition = "2021"
rust-version = "1.96"
authors.workspace = true
description = "MCP surface for soma"
homepage.workspace = true
license = "MIT"
repository.workspace = true
publish = false

[package.metadata.soma-architecture]
layer = "product-surface"

[features]
default = []
stdio = ["rmcp/transport-io"]
http = ["dep:axum", "rmcp/transport-streamable-http-server", "soma-mcp-server/http"]
auth = ["dep:soma-auth"]
oauth = ["auth"]
test-support = []

[dependencies]
anyhow = "1"
axum = { version = "0.8", optional = true }
http = "1"
rmcp = { workspace = true, features = [
  "server",
  "macros",
  "elicitation",
  "schemars",
] }
rmcp-traces = { workspace = true }
soma-auth = { workspace = true, optional = true, features = ["http-axum"] }
soma-application = { workspace = true }
soma-config = { workspace = true }
soma-domain = { workspace = true }
soma-mcp-server = { workspace = true }
soma-provider-core = { workspace = true }
schemars = "1.2.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["io-std", "macros"] }
tracing = "0.1"
url = "2"

[dev-dependencies]
async-trait = "0.1"
rmcp = { workspace = true, features = [
  "client",
  "transport-io",
] }
soma-test-support = { workspace = true }
tempfile = "3"
tokio = { version = "1", features = ["io-util", "macros", "rt"] }
tracing-subscriber = { version = "0.3", features = ["fmt"] }
