<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labby Palette</title>
    <link rel="icon" type="image/png" href="/src-tauri/icons/32x32.png" />
    <!-- P-M3: preload the primary display face (Manrope) so the first paint
         uses it instead of flashing the OS UI font. Vite rewrites this source
         path to the hashed /assets/* output at build time. -->
    <link
      rel="preload"
      href="/src/fonts/manrope-var.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
