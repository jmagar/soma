# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []                # check all targets
all-features = false
no-default-features = false

# ── Advisories ────────────────────────────────────────────────────────────────

[advisories]
version = 2
yanked = "deny"

# Known advisories we've reviewed and accepted:
ignore = [
  # RUSTSEC-2023-0071 — Marvin Attack (RSA timing side-channel) in the `rsa` crate.
  # Pulled in transitively: lab-auth → jsonwebtoken → rsa v0.9.10 / v0.10.0-rc.18.
  # No upstream fix exists yet (as of 2026-05). The RSA keys are used for JWT
  # signing only (short-lived tokens, not long-term data encryption), and the
  # server is not exposed to untrusted timing oracles in its normal deployment.
  # Revisit when jsonwebtoken releases a fix or switches to a constant-time impl.
  { id = "RUSTSEC-2023-0071", reason = "no fix available; risk accepted for JWT-only usage via lab-auth" },

  # RUSTSEC-2024-0411/0412/0413/0414/0415/0416/0417/0418/0419/0420 — gtk-rs GTK3
  # bindings ("no longer maintained", upstream points to gtk4-rs). Pulled in
  # transitively: soma-tauri-shell → tauri → tray-icon → libappindicator → gtk
  # 0.18 (gdk, gdk-sys, gdkx11, gdkx11-sys, gdkwayland-sys, gtk, gtk-sys,
  # gtk3-macros, atk, atk-sys). This is Tauri 2.x's current Linux tray-icon/
  # windowing backend as of 2026-07 — every Tauri 2.x desktop app on Linux
  # pulls the same GTK3 stack; tauri-runtime-wry has not migrated to gtk4-rs.
  # These are "unmaintained" flags, not active vulnerabilities/CVEs. Revisit
  # when tauri-runtime-wry/tray-icon ship a GTK4 (or GTK-free) Linux backend.
  { id = "RUSTSEC-2024-0411", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },
  { id = "RUSTSEC-2024-0412", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },
  { id = "RUSTSEC-2024-0413", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },
  { id = "RUSTSEC-2024-0414", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },
  { id = "RUSTSEC-2024-0415", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },
  { id = "RUSTSEC-2024-0416", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },
  { id = "RUSTSEC-2024-0417", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },
  { id = "RUSTSEC-2024-0418", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },
  { id = "RUSTSEC-2024-0419", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },
  { id = "RUSTSEC-2024-0420", reason = "unmaintained gtk-rs GTK3 binding; inherent to Tauri 2.x Linux tray-icon backend, no upstream fix yet" },

  # RUSTSEC-2024-0370 — proc-macro-error is unmaintained. Pulled in via
  # soma-tauri-shell → tauri → wry/webkit2gtk's macro dependencies. No
  # replacement forced by upstream yet.
  { id = "RUSTSEC-2024-0370", reason = "unmaintained proc-macro-error; transitive via tauri's webkit2gtk/wry stack, no upstream fix yet" },

  # RUSTSEC-2025-0075/0080/0081/0098/0100 — unic-* Unicode data crates are
  # unmaintained. Pulled in transitively: soma-tauri-shell → tauri →
  # tauri-utils → urlpattern → unic-ucd-ident/unic-ucd-version →
  # unic-char-property/unic-char-range/unic-common. No safe upgrade path
  # until tauri-utils moves off urlpattern's unic-* dependency.
  { id = "RUSTSEC-2025-0075", reason = "unmaintained unic-* Unicode crate; transitive via tauri-utils → urlpattern, no upstream fix yet" },
  { id = "RUSTSEC-2025-0080", reason = "unmaintained unic-* Unicode crate; transitive via tauri-utils → urlpattern, no upstream fix yet" },
  { id = "RUSTSEC-2025-0081", reason = "unmaintained unic-* Unicode crate; transitive via tauri-utils → urlpattern, no upstream fix yet" },
  { id = "RUSTSEC-2025-0098", reason = "unmaintained unic-* Unicode crate; transitive via tauri-utils → urlpattern, no upstream fix yet" },
  { id = "RUSTSEC-2025-0100", reason = "unmaintained unic-* Unicode crate; transitive via tauri-utils → urlpattern, no upstream fix yet" },
]

# ── Licenses ──────────────────────────────────────────────────────────────────

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",                           # foldhash (via hashbrown → rusqlite → lab-auth)
  "MPL-2.0",                        # option-ext (via dirs-sys → dirs)
  "CDLA-Permissive-2.0",            # webpki-roots / webpki-root-certs (via reqwest → rustls)
  "MIT-0",                          # borrow-or-share (via fluent-uri → referencing → jsonschema)
]
# Confidence threshold for license text detection (0.0–1.0)
confidence-threshold = 0.8

# ── Bans ──────────────────────────────────────────────────────────────────────

[bans]
# Deny multiple versions of the same crate — forces explicit resolution
multiple-versions = "warn"
# "warn" not "deny": git deps with a pinned rev have no semver version field,
# which cargo-deny treats as a wildcard — but the rev IS the pin.
wildcards = "warn"
# Allow path deps (e.g. the self-referencing dev dep) to omit a version.
allow-wildcard-paths = true

# Crates we never want pulled in
deny = [
  # openssl (native) — this project uses rustls; openssl appearing means a dep
  # silently pulled in native SSL. Use the rustls feature flag instead.
  { name = "openssl" },
  { name = "openssl-sys" },
]

# Known duplicate version pairs that can't be resolved yet — remove when fixed
skip = []

skip-tree = []

# ── Sources ───────────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  # lab-auth is vendored from the private lab mono-repo at a pinned rev
  "https://github.com/jmagar/lab.git",
]
